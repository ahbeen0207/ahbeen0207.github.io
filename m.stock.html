<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식관리 시스템 - 모바일 주식</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* 글로벌 테마 변수 선언 (다크모드 스타일링) */
        :root {
            --vv-bg-main: #121212;
            --vv-bg-card: #2c2c2c;
            --vv-border: #3d3d3d;
            --vv-text-main: rgba(255, 255, 255, 0.95);
            --vv-text-muted: rgba(255, 255, 255, 0.65);
            --vv-text-mint: #03dac6;
            --point-blue: #3b82f6;
            --point-green: #2ecc71;
            --point-purple: #a855f7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--vv-bg-main); 
            color: var(--vv-text-main); 
            font-family: 'Pretendard', sans-serif; 
            padding: 12px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 모바일 상단 네비게이션 바 */
        .top-section { 
            display: flex; 
            flex-direction: column;
            gap: 8px; 
            margin-bottom: 15px; 
            flex-shrink: 0;
        }
        
        .header-menu { 
            border: 1px solid var(--vv-border); 
            border-radius: 8px; 
            display: flex; 
            background-color: var(--vv-bg-card); 
            overflow: hidden; 
            width: 100%;
        }
        
        .header-menu a { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-decoration: none; 
            color: var(--vv-text-main); 
            font-weight: 600; 
            font-size: 13px;
            padding: 12px 0;
            border-right: 1px solid var(--vv-border); 
            transition: 0.2s; 
            text-align: center;
        }
        
        .header-menu a:last-child { border-right: none; }
        .header-menu a.active { background-color: var(--point-blue); color: white; }
        .header-menu a.home-btn { color: var(--vv-text-mint); }

        /* 메인 콘텐츠 영역 */
        main { 
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        /* 상단 금액 현황판 스타일 */
        .status-summary-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .status-summary-input {
            flex: 1;
            height: 40px;
            background-color: var(--vv-bg-card);
            border: 1px solid var(--vv-border);
            border-radius: 6px;
            font-size: 13px;       
            font-weight: 800;       
            color: white;
            text-align: center;
            outline: none;
            cursor: default;
        }
        .status-summary-input.total-invest-val { color: var(--point-green) !important; }
        #status-last-updated { color: var(--point-blue) !important; font-size: 13px; font-weight: 800; }

        /* 모바일 최적화 필터 영역 */
        .filter-container { 
            display: flex; 
            flex-direction: column;
            gap: 10px; 
            background: var(--vv-bg-card); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--vv-border); 
            margin-bottom: 15px; 
        }

        .filter-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .filter-item { 
            flex: 1;
            display: flex; 
            flex-direction: column;
            gap: 4px; 
        }
        .filter-item label { color: var(--vv-text-mint); font-size: 11px; font-weight: 600; }
        .filter-item input, .filter-item select { 
            width: 100%;
            background: var(--vv-bg-main); 
            border: 1px solid var(--vv-border); 
            color: white; 
            padding: 8px; 
            border-radius: 6px; 
            font-size: 13px;
            height: 36px;
        }
        
        .btn-search { 
            width: 100%;
            height: 38px;
            background-color: var(--point-blue); 
            border-radius: 6px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            font-size: 14px; 
            margin-top: 5px;
        }

        /* 데이터 그리드 테이블 스타일링 (모바일 스크롤 지원) */
        .table-area { 
            flex: 1; 
            overflow: auto; 
            border: 1px solid var(--vv-border); 
            border-radius: 8px; 
            background: var(--vv-bg-card);
        }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { position: sticky; top: 0; background: #333; color: var(--vv-text-mint); font-size: 12px; padding: 10px 6px; border-bottom: 2px solid var(--vv-border); text-align: center; z-index: 10; }
        td { padding: 12px 6px; border-bottom: 1px solid var(--vv-border); font-size: 13px; text-align: center; color: var(--vv-text-main); }
        tr:hover { background-color: rgba(255,255,255,0.03); }
		
        .col-stock-name { text-align: left !important; font-weight: 600; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .col-numeric { text-align: right !important; padding-right: 8px !important; }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="header-menu">
            <a href="m.select_page.html" class="home-btn">홈</a>
            <a href="m.dashboard.html">자산현황</a>
            <a href="#" class="active">주식</a>
            <a href="m.stock_ipo.html">공모주</a>
            <a href="m.deposit.html">예적금</a>
        </div>
    </div>

    <main id="main-status">
        <div class="status-summary-group">
            <input type="text" id="status-total-invest" class="status-summary-input total-invest-val" readonly value="0원">
            <input type="text" id="status-total-profit" class="status-summary-input" readonly value="0원 (0%)">
        </div>

        <div class="filter-container">
            <div class="filter-row">
                <div class="filter-item">
                    <label>데이터 업데이트 시간</label>
                    <input type="text" id="status-last-updated" class="status-summary-input" readonly value="-">
                </div>
                <div class="filter-item">
                    <label>시장구분</label>
                    <select id="status-filter-market">
                        <option value="">전체</option>
                        <option value="KR">KR</option>
                        <option value="US">US</option>
                        <option value="KRUS">KRUS</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-item">
                    <label>자산분류</label>
                    <select id="status-filter-asset">
                        <option value="">전체</option>
                        <option value="주식" selected>주식</option>
                        <option value="채권">채권</option>
                        <option value="금은">금은</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>증권사</label>
                    <select id="status-filter-brokerage">
                        <option value="">전체</option>
                        <option value="미래에셋">미래에셋</option>
                        <option value="NH투자증권">NH투자증권</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-item">
                    <label>계좌</label>
                    <select id="status-filter-account">
                        <option value="">전체</option>
                        <option value="연금저축계좌">연금저축계좌</option>
                        <option value="주식계좌">주식계좌</option>
                        <option value="ISA">ISA</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>종목명</label>
                    <input type="text" id="status-filter-name">
                </div>
            </div>
            <button class="btn-search" onclick="renderStatusTable()">검색</button>
        </div>

        <div class="table-area">
            <table id="status-table">
                <thead>
                    <tr>
                        <th>종목명</th>
                        <th class="col-numeric">잔고</th>
                        <th class="col-numeric">원화매입가</th>
                        <th class="col-numeric">원화현재가</th>
                        <th class="col-numeric">투자수익</th>
                        <th class="col-numeric">수익률</th>
                    </tr>
                </thead>
                <tbody id="status-table-body">
                    <tr><td colspan="6">데이터를 불러오는 중입니다.</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l'; 
        
        let _supabase;
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.error("Supabase 초기화 실패:", e);
        }

        let globalActiveStocks = []; 

        async function fetchStatusDashboard() {
            const statusBody = document.getElementById('status-table-body');
            statusBody.innerHTML = '<tr><td colspan="6">보유 자산 데이터를 산출하는 중입니다...</td></tr>';

            if (!_supabase) return;

            try {
                const [tradesRes, realtimeRes] = await Promise.all([
                    _supabase.from('tb_stock_trade').select('*'),
                    _supabase.from('tb_realtime_stock_status').select('stock_code, live_price, updated_at')
                ]);

                if (tradesRes.error) throw tradesRes.error;
                if (realtimeRes.error) throw realtimeRes.error;

                const safeTrades = tradesRes.data || [];
                const realtimePrices = realtimeRes.data || [];

                let latestUpdateIso = null;
                const priceMap = {};
                
                realtimePrices.forEach(item => {
                    if (item.stock_code) priceMap[item.stock_code] = parseFloat(item.live_price) || 0;
                    if (item.updated_at && (!latestUpdateIso || item.updated_at > latestUpdateIso)) {
                        latestUpdateIso = item.updated_at;
                    }
                });

                const txtLastUpdated = document.getElementById('status-last-updated');
                if (txtLastUpdated) {
                    if (latestUpdateIso) {
                        const d = new Date(latestUpdateIso);
                        const pad = (n) => n < 10 ? '0' + n : n;
                        txtLastUpdated.value = `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                    } else { 
                        txtLastUpdated.value = "-"; 
                    }
                }

                const stockMap = {};
                safeTrades.forEach(trade => {
                    const tickerKey = trade.stock_code || trade.stock_name;
                    const key = `${tickerKey}_${trade.brokerage_name}_${trade.account_type}`;
                    
                    if (!stockMap[key]) {
                        stockMap[key] = {
                            market_type: trade.market_type, 
                            brokerage_name: trade.brokerage_name, 
                            account_type: trade.account_type,     
                            asset_type: trade.asset_type, 
                            stock_name: trade.stock_name, 
                            stock_code: trade.stock_code, 
                            balance: 0, 
                            total_cost: 0, 
                            avg_price: 0   
                        };
                    }

                    const s = stockMap[key];
                    const qty = parseFloat(trade.quantity) || 0;
                    const amt = parseFloat(trade.amount_krw) || 0;

                    if (trade.trade_side === '매수') { 
                        s.balance += qty; 
                        s.total_cost += amt; 
                    } else if (trade.trade_side === '매도') {
                        if (s.balance > 0) {
                            const currentAvg = s.total_cost / s.balance;
                            s.balance -= qty; 
                            s.total_cost = s.balance * currentAvg; 
                        } else { 
                            s.balance -= qty; 
                            s.total_cost -= amt; 
                        }
                    }
                });

                let processedStocks = Object.values(stockMap).map(s => {
                    s.avg_price = s.balance > 0 ? (s.total_cost / s.balance) : 0;
                    return s;
                }).filter(s => s.balance !== 0);

                processedStocks.forEach(stock => {
                    let livePriceKrw = priceMap[stock.stock_code] || stock.avg_price; 
                    stock.live_price_krw = livePriceKrw;     
                    stock.live_current_krw = stock.balance * livePriceKrw;   
                    stock.live_profit = stock.live_current_krw - stock.total_cost;       
                    stock.live_rate = stock.total_cost > 0 ? (stock.live_profit / stock.total_cost) * 100 : 0;           
                });

                globalActiveStocks = processedStocks;
                globalActiveStocks.sort((a, b) => (b.live_current_krw || 0) - (a.live_current_krw || 0));
                
                renderStatusTable();

            } catch (error) {
                console.error('현황 데이터 로드 에러:', error);
                statusBody.innerHTML = '<tr><td colspan="6" style="color:#ff4b4b">데이터 로드 실패.</td></tr>';
            }
        }

        function renderStatusTable() {
            const statusBody = document.getElementById('status-table-body');
			
            const fMarket = document.getElementById('status-filter-market')?.value || "";
            const fBrokerage = document.getElementById('status-filter-brokerage')?.value || "";
            const fAccount = document.getElementById('status-filter-account')?.value || "";
            const fAsset = document.getElementById('status-filter-asset')?.value || "";
            const fName = document.getElementById('status-filter-name')?.value.trim().toLowerCase() || "";

            const filtered = globalActiveStocks.filter(s => {
                if (fMarket && s.market_type !== fMarket) return false;
                if (fBrokerage && s.brokerage_name !== fBrokerage) return false;
                if (fAccount && s.account_type !== fAccount) return false;
                if (fAsset && s.asset_type !== fAsset) return false;
                if (fName && !s.stock_name.toLowerCase().includes(fName)) return false;
                return true;
            });

            if (!filtered || filtered.length === 0) {
                statusBody.innerHTML = '<tr><td colspan="6">조건에 맞는 보유 자산 내역이 없습니다.</td></tr>';
                if (document.getElementById('status-total-invest')) document.getElementById('status-total-invest').value = "0원";
                if (document.getElementById('status-total-profit')) document.getElementById('status-total-profit').value = "0원 (0%)";
                return;
            }

            let html = '';
            filtered.forEach((s) => {
                const liveCurrent = s.live_current_krw || (s.balance * s.avg_price);
                const liveProfit = s.live_profit || 0;
                const liveRate = s.live_rate || 0;

                let profitStyle = ''; let profitSign = '';
                if (liveProfit > 0) {
                    profitStyle = 'color: #ff4b4b;'; profitSign = '+';
                } else if (liveProfit < 0) {
                    profitStyle = 'color: #3b82f6;';
                }

                html += `
                    <tr>
                        <td class="col-stock-name">${s.stock_name}</td>
                        <td class="col-numeric">${Math.round(s.balance).toLocaleString()}</td>
                        <td class="col-numeric">${Math.round(s.total_cost).toLocaleString()}원</td>
                        <td class="col-numeric">${Math.round(liveCurrent).toLocaleString()}원</td>
                        <td class="col-numeric" style="${profitStyle}">${profitSign}${Math.round(liveProfit).toLocaleString()}원</td>
                        <td class="col-numeric" style="${profitStyle}">${profitSign}${liveRate.toFixed(1)}%</td>
                    </tr>
                `;
            });
            statusBody.innerHTML = html;

            let totalCostSum = 0;       
            let totalCurrentSum = 0;    

            filtered.forEach(s => {
                totalCostSum += (parseFloat(s.total_cost) || 0);
                totalCurrentSum += (parseFloat(s.live_current_krw) || 0);
            });

            let totalProfitSum = totalCurrentSum - totalCostSum; 
            let profitRate = totalCostSum > 0 ? (totalProfitSum / totalCostSum) * 100 : 0; 

            const txtInvest = document.getElementById('status-total-invest');
            const txtProfit = document.getElementById('status-total-profit');

            if (txtInvest) { txtInvest.value = Math.round(totalCurrentSum).toLocaleString() + "원"; }

            if (txtProfit) {
                const sign = totalProfitSum > 0 ? "+" : "";
                txtProfit.value = `${sign}${Math.round(totalProfitSum).toLocaleString()}원 (${sign}${profitRate.toFixed(1)}%)`; 

                if (totalProfitSum > 0) {
                    txtProfit.style.color = "#ff4b4b"; 
                } else if (totalProfitSum < 0) {
                    txtProfit.style.color = "var(--point-blue)"; 
                } else {
                    txtProfit.style.color = "var(--vv-text-main)"; 
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchStatusDashboard();
        });
    </script>
</body>
</html>
