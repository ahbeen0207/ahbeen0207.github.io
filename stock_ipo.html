<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식관리 시스템 - 공모주투자</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #0E0E10;
        }
        .sidebar-bg {
            background-color: #141416;
            border-left: 1px solid #232329;
            border-right: 1px solid #232329;
        }
        /* 중앙 80% 인터페이스의 가장 우측 경계선 스타일 정의 */
        .content-frame {
            border-right: 1px solid #232329;
        }
        .card-bg {
            background-color: #18181C;
            border: 1px solid #232329;
        }
        .input-bg {
            background-color: #111114;
            border: 1px solid #232329;
        }
        
        /* 브라우저 메인 및 메인프레임 우측 전체 스크롤바 숨기기 기능 */
        .no-scrollbar::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* 데이터 테이블 내부 전용 가로 스크롤바 스타일 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #141416;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2D2D35;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3E3E4A;
        }

        /* 페이지네이션 스타일 커스텀 */
        .page-btn {
            background-color: #141416;
            border: 1px solid #232329;
            color: #A1A1AA;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            min-width: 32px;
            text-align: center;
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background-color: #232329;
            color: #ffffff;
            border-color: #5850EC;
        }
        .page-btn.active {
            background-color: #5850EC;
            color: white;
            border-color: #5850EC;
            font-weight: bold;
        }
        .page-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            background-color: #0E0E10;
        }

        /* 크롬 달력 인풋 반전 */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="text-[#E4E4E7] text-sm antialiased flex h-screen overflow-hidden bg-[#0E0E10]">

    <!-- 좌측 10% 공백 유지 -->
    <div class="w-[10%] h-full bg-[#0E0E10] shrink-0"></div>

    <!-- 중앙 80% 영역 -->
    <div class="w-[80%] h-full flex shrink-0 content-frame">
        
        <!-- 좌측 사이드바: 너비 w-52, 내부 패딩 p-3 -->
        <aside class="w-52 sidebar-bg flex flex-col justify-between p-3 shrink-0 h-full">
            <div>
                <!-- 상단 로고: 마진 mb-5, black_rabbit 로고 100% 확대 -->
                <a href="select_page.html" class="flex items-center justify-center gap-2.5 mb-5 px-1 hover:opacity-85 transition">
                    <div class="bg-[#5850EC] p-1.5 rounded-xl text-white shadow-lg shadow-[#5850EC]/25 shrink-0 flex items-center justify-center">
                        <img src="black_rabbit.jpg" class="w-10 h-10 rounded-lg object-cover" onerror="this.src='rabbit.jpg'">
                    </div>
                    <span class="font-bold text-xl tracking-tight text-white">HOME</span>
                </a>
                
                <!-- 네비게이션: 주식관리 스위칭 탭 구성 (mt-20 적용) -->
                <nav class="space-y-0.5 mt-20">
                    <button id="btn-status" class="w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none" onclick="switchView('status')">
                        <i data-lucide="layout-grid" class="w-5 h-5 text-[#5850EC]"></i> 거래내역
                    </button>
                    <button id="btn-trade" class="w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none" onclick="switchView('trade')">
                        <i data-lucide="history" class="w-5 h-5"></i> 공모주투자현황
                    </button>
                </nav>
            </div>

            <!-- 하단 정보: Supabase 로그인 사용자 연동 (U아이콘 + 계정명) -->
            <div class="border-t border-[#232329] pt-2 flex items-center gap-2 px-1">
                <div class="w-8 h-8 rounded-full bg-[#5850EC]/20 border border-[#5850EC]/40 flex items-center justify-center text-[#A5A6F6] text-sm font-bold shrink-0">
                    U
                </div>
                <div class="min-w-0">
                    <p id="user-email" class="text-sm font-semibold text-white truncate">Loading...</p>
                </div>
            </div>
        </aside>

        <!-- 우측 메인 영역 -->
        <main class="flex-1 flex flex-col overflow-y-auto bg-[#0E0E10] h-full no-scrollbar">
            
            <!-- 상단 헤더: 6개 균등 분할 네비게이션 (세로 크기 h-20, 폰트 text-lg) -->
            <header class="h-20 border-b border-[#232329] px-2 flex items-center bg-[#0E0E10]/50 backdrop-blur-md sticky top-0 z-10 shrink-0">
                <div class="grid grid-cols-6 gap-1.5 w-full">
                    <a href="dashboard.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> 자산 현황
                    </a>
                    <a href="stock.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="trending-up" class="w-5 h-5"></i> 주식투자
                    </a>
                    <a href="#" class="flex items-center justify-center gap-2 bg-[#232329] text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="file-text" class="w-5 h-5 text-[#5850EC]"></i> 공모주투자
                    </a>
                    <a href="deposit.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="landmark" class="w-5 h-5"></i> 예적금
                    </a>
                    <a href="#" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition" onclick="location.reload(true); return false;">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i> 새로고침
                    </a>
                    <div class="flex items-center justify-center gap-2 text-slate-400 px-2 py-2.5 rounded-lg text-lg font-medium">
                        <i data-lucide="clock" class="w-5 h-5"></i> <span id="last-updated-text">-</span>
                    </div>
                </div>
            </header>

            <!-- 메인 콘텐츠 영역: 패딩 p-4, 내부 간격 space-y-3 제거 -->
            <div class="p-4 w-full flex-1 flex flex-col">
                
                <!-- 1. 거래내역 뷰 -->
                <div id="main-status" class="space-y-3 w-full flex-1 flex flex-col">
                    
                    <!-- 필터 카드 -->
                    <div id="filter-box" class="card-bg py-5 px-3 rounded-lg shadow-xl flex flex-wrap items-center gap-3 text-sm shrink-0">
                        <div class="flex items-center gap-1">
                            <input type="month" id="filter-date" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC] w-36">
                        </div>
                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">청약자</label>
                            <select id="filter-owner" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="man" selected>man</option>
                                <option value="been">been</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[120px] flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">주관사</label>
                            <input type="text" id="filter-brokerage" placeholder="주관사명 입력" onkeyup="if(window.event.keyCode==13){fetchIpoHistory(1)}" class="w-full text-xs input-bg rounded-md px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-[#5850EC]">
                        </div>
                        <div class="flex-1 min-w-[120px] flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">공모주명</label>
                            <input type="text" id="filter-name" placeholder="공모주명 입력" class="w-full text-xs input-bg rounded-md px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-[#5850EC]">
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <button class="bg-[#5850EC] hover:bg-[#4B43D3] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="fetchIpoHistory(1)">
                                <i data-lucide="search" class="w-3.5 h-3.5"></i> 검색
                            </button>
                            <button class="bg-[#10B981] hover:bg-[#7C3AED] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="openRegisterModal()">
                                <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> 등록
                            </button>
                        </div>
                    </div>

                    <!-- 데이터 리스트 카드 -->
                    <div class="card-bg p-4 rounded-xl shadow-xl flex flex-col overflow-hidden flex-1">
                        <div class="overflow-x-auto custom-scrollbar text-sm flex-1">
                            <table id="data-table" class="w-full text-left border-collapse whitespace-nowrap">
                                <thead class="bg-[#141416] text-slate-400 uppercase font-medium border-b border-[#232329]">
                                    <tr>
                                        <th class="p-2.5">청약자</th>
                                        <th class="p-2.5 text-left">공모주명</th>
                                        <th class="p-2.5">주관사</th>
                                        <th class="p-2.5">청약일</th>
                                        <th class="p-2.5">상장일</th>
                                        <th class="p-2.5 text-right">배정수량</th>
                                        <th class="p-2.5 text-right">공모가</th>
                                        <th class="p-2.5 text-right">매도가</th>
                                        <th class="p-2.5 text-right">매도수수료세금</th>
                                        <th class="p-2.5 text-right">증권사수수료</th>
                                        <th class="p-2.5 text-right">대출이자</th>
                                        <th class="p-2.5 text-right pr-10">수익금</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body" class="divide-y divide-[#232329] text-slate-300">
                                    <tr><td colspan="12" class="p-4 text-center">공모주 투자 데이터를 불러오는 중입니다.</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div id="pagination" class="flex justify-center items-center gap-1 mt-4 pt-3 border-t border-[#232329] user-select-none"></div>
                    </div>
                </div>

                <!-- 2. 공모주투자현황 뷰 -->
                <div id="main-trade" class="space-y-4 w-full flex-1 flex flex-col" style="display: none;">
                    
                    <!-- 1~12월 월별 표 -->
                    <div class="card-bg p-4 rounded-xl shadow-xl overflow-x-auto custom-scrollbar py-5">
                        <table class="w-full text-center border-collapse whitespace-nowrap text-sm border border-[#232329]">
                            <thead class="bg-[#141416] text-slate-400 font-medium border-b border-[#232329]">
                                <tr>
                                    <th class="p-2.5 border-r border-[#232329]">1월</th>
                                    <th class="p-2.5 border-r border-[#232329]">2월</th>
                                    <th class="p-2.5 border-r border-[#232329]">3월</th>
                                    <th class="p-2.5 border-r border-[#232329]">4월</th>
                                    <th class="p-2.5 border-r border-[#232329]">5월</th>
                                    <th class="p-2.5 border-r border-[#232329]">6월</th>
                                    <th class="p-2.5 border-r border-[#232329]">7월</th>
                                    <th class="p-2.5 border-r border-[#232329]">8월</th>
                                    <th class="p-2.5 border-r border-[#232329]">9월</th>
                                    <th class="p-2.5 border-r border-[#232329]">10월</th>
                                    <th class="p-2.5 border-r border-[#232329]">11월</th>
                                    <th class="p-2.5 border-r border-[#232329]">12월</th>
                                    <th class="p-2.5">총수익</th>
                                </tr>
                            </thead>
                            <tbody class="text-slate-300">
                                <tr class="border-b border-[#232329]">
                                    <td id="m1-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m2-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m3-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m4-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m5-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m6-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m7-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m8-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m9-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m10-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m11-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="m12-profit" class="p-2.5 border-r border-[#232329]">0</td>
                                    <td id="total-year-profit" class="p-2.5 font-bold text-slate-300">0</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 실시간 자산 현황 그래프 카드 -->
                    <div class="card-bg p-4 rounded-xl shadow-xl flex flex-col flex-1 overflow-hidden">
                        <div class="flex flex-wrap justify-between items-center mb-4 gap-2 text-xs">
                            <div class="flex gap-2">
                                <select id="chart-year-select" onchange="updateDashboardStats()" class="bg-[#141416] text-slate-300 rounded-md px-2.5 py-1.5 border border-[#232329] focus:outline-none">
                                    <option value="2026">2026년</option>
                                    <option value="2025">2025년</option>
                                </select>
                                <select id="chart-owner-select" onchange="updateDashboardStats()" class="bg-[#141416] text-slate-300 rounded-md px-2.5 py-1.5 border border-[#232329] focus:outline-none">
                                    <option value="man" selected>man</option>
                                    <option value="been">been</option>
                                    <option value="">전체</option>
                                </select>
                            </div>
                            
                            <!-- <span class="text-slate-400 font-bold">공모주 실시간 자산 현황 그래프</span> -->
                            
                            <div class="w-10"></div>
                        </div>
                        <div class="flex-1 min-h-[300px]">
                            <canvas id="monthlyChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 등록/수정 모달 -->
    <div id="register-modal" class="hidden fixed inset-0 bg-black/60 z-50 overflow-y-auto flex items-center justify-center p-4">
        <div id="draggable-modal" class="card-bg rounded-xl shadow-2xl w-full max-w-4xl border border-[#232329] flex flex-col overflow-hidden transform transition-all animate-in fade-in zoom-in-95 duration-200">
            <div class="px-4 py-3 bg-[#141416] border-b border-[#232329] flex items-center justify-between cursor-move" id="modal-header-drag">
                <h2 id="modal-title" class="text-base font-bold text-white flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-[#5850EC]"></i> 공모주 투자내역 등록
                </h2>
                <button onclick="closeRegisterModal()" class="text-slate-400 hover:text-white transition focus:outline-none">&times;</button>
            </div>
            
            <input type="hidden" id="form-id">
            <div class="p-4 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">청약자</label><select id="form-account-owner" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"><option value="man">man</option><option value="been">been</option></select></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">공모주명</label><input type="text" id="form-stock-name" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">주관사</label><input type="text" id="form-broker" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">공모가</label><input type="text" id="form-offering-price" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">청약일</label><input type="date" id="form-subscription-date" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">환불일</label><input type="date" id="form-refund-date" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">상장일</label><input type="date" id="form-listing-date" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">매도일</label><input type="date" id="form-sell-date" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">증거금</label><input type="text" id="form-deposit-amount" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">청약수량</label><input type="text" id="form-subscription-qty" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">배정수량</label><input type="text" id="form-allocated-qty" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">청약수수료</label><input type="text" id="form-sub-fee" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">매도가</label><input type="text" id="form-selling-price" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">매도수수료세금</label><input type="text" id="form-tax-fee" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                    <div class="form-group"><label class="block text-xs text-slate-400 mb-1">대출이자</label><input type="text" id="form-loan-interest" value="0" oninput="formatNumberInput(this)" class="w-full bg-[#141416] text-white rounded-md px-3 py-2 border border-[#232329] focus:border-[#5850EC]"></div>
                </div>
            </div>
            <div class="px-4 py-3 bg-[#141416] border-t border-[#232329] flex justify-end gap-2">
                <button id="btn-delete-ipo" class="px-4 py-2 bg-red-600 text-white rounded-md text-sm hover:bg-red-700 mr-auto" onclick="deleteIpoData()" style="display: none;">삭제</button>
                <button class="px-4 py-2 bg-[#232329] text-white rounded-md text-sm hover:bg-[#303038]" onclick="closeRegisterModal()">취소</button>
                <button class="px-4 py-2 bg-[#5850EC] text-white rounded-md text-sm hover:bg-[#4B43D3]" onclick="saveIpoData()">저장</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Supabase & 전역 상태 설정 (기존 소스 완벽 복구)
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l';
        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const PAGE_SIZE = 15; // 한 페이지당 표시할 행 수
        let currentFilteredData = []; // 대시보드 통계용 전역 데이터

        // 2. 화면 초기화 및 탭 전환
        document.addEventListener('DOMContentLoaded', () => {
            // Lucide 아이콘 초기화
            if (window.lucide) lucide.createIcons();
            
            // 날짜 필터 기본 설정 및 첫 화면 로드 (기존 메인 데이터 복구 핵심)
            const filterDateInput = document.getElementById('filter-date');
            if (filterDateInput) {
                filterDateInput.value = ''; // 초기에는 공백으로 전체 데이터가 나오도록 설정
            }
            
            // 기본 뷰로 '거래내역(status)' 설정 및 데이터 호출
            switchView('status');

            // 마지막 데이터 업데이트 시간 표시
            updateLastUpdatedTime();
        });

        /**
         * 헤더의 마지막 데이터 업데이트 시간을 현재 시각으로 갱신하는 함수
         */
        function updateLastUpdatedTime() {
            const el = document.getElementById('last-updated-text');
            if (!el) return;
            const now = new Date();
            el.innerText = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function switchView(viewName) {
            const statusMain = document.getElementById('main-status');
            const tradeMain = document.getElementById('main-trade');
            const btnStatus = document.getElementById('btn-status');
            const btnTrade = document.getElementById('btn-trade');

            if (viewName === 'status') {
                if (statusMain) statusMain.style.display = 'flex';
                if (tradeMain) tradeMain.style.display = 'none';
                
                // 버튼 스타일 활성화/비활성화 제어
                btnStatus.className = "w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                btnTrade.className = "w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                
                fetchIpoHistory(1);
            } else if (viewName === 'trade') {
                if (statusMain) statusMain.style.display = 'none';
                if (tradeMain) tradeMain.style.display = 'flex';
                
                btnStatus.className = "w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                btnTrade.className = "w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                
                loadAllDataForDashboard();
            }
            if (window.lucide) lucide.createIcons();
        }

        // 3. 거래내역 조회 및 원래 페이징 로직 결합
        async function fetchIpoHistory(page = 1) {
            const tbody = document.getElementById('table-body');
            if (!tbody) return;
            
            tbody.innerHTML = `<tr><td colspan="12" class="p-4 text-center text-slate-400">데이터를 불러오는 중입니다...</td></tr>`;
            
            try {
                const filterDate = document.getElementById('filter-date')?.value || '';
                const filterOwner = document.getElementById('filter-owner')?.value || '';
                const filterBrokerage = document.getElementById('filter-brokerage')?.value || '';
                const filterName = document.getElementById('filter-name')?.value || '';
                
                let query = clientSupabase
                    .from('tb_ipo_investment')
                    .select('*', { count: 'exact' });
                
                // 검색 조건 필터 적용
                if (filterOwner) {
                    query = query.eq('account_owner', filterOwner);
                }
                if (filterBrokerage) {
                    query = query.ilike('broker', `%${filterBrokerage}%`);
                }
                if (filterName) {
                    query = query.ilike('stock_name', `%${filterName}%`);
                }
                if (filterDate) {
                    const [year, month] = filterDate.split('-');
                    const startRange = `${filterDate}-01`;
                    let nextYear = parseInt(year);
                    let nextMonth = parseInt(month) + 1;
                    if (nextMonth > 12) {
                        nextMonth = 1;
                        nextYear += 1;
                    }
                    const endRange = `${nextYear}-${String(nextMonth).padStart(2, '0')}-01`;
                    query = query.gte('subscription_date', startRange).lt('subscription_date', endRange);
                }
                
                // 누락되었던 오프셋 및 범위 연산 완벽 정정
                const from = (page - 1) * PAGE_SIZE;
                const to = from + PAGE_SIZE - 1;
                
                const { data, count, error } = await query
                    .order('subscription_date', { ascending: false })
                    .range(from, to);
                    
                if (error) throw error;
                
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="12" class="p-4 text-center text-slate-500">조회된 내역이 없습니다.</td></tr>`;
                    renderPagination(0, page);
                    updateLastUpdatedTime();
                    return;
                }
                
                // 테이블 드로잉 및 계산 공식 (stock_ipo (2).html 방식 적용)
                data.forEach(item => {
                    const allocatedQty = Number(item.allocated_qty || 0);
                    const offeringPrice = Number(item.offering_price || 0);
                    const sellingPrice = Number(item.selling_price || 0);
                    const taxAndSellFee = Number(item.tax_and_sell_fee || 0);
                    const subscriptionFee = Number(item.subscription_fee || 0);
                    const loanInterest = Number(item.loan_interest || 0);
                    
                    // 기존 코드의 정확한 수익금 공식 매칭
                    let profit = 0;
                    let profitText = '-';
                    let profitColor = 'text-slate-300';
                    
                    if (sellingPrice > 0) {
                        profit = ((sellingPrice - offeringPrice) * allocatedQty) - taxAndSellFee - subscriptionFee - loanInterest;
                        profitText = profit >= 0 ? `+${profit.toLocaleString()}` : profit.toLocaleString();
                        profitColor = profit >= 0 ? 'text-[#f87171]' : 'text-[#60a5fa]';
                    } else if (allocatedQty > 0 || subscriptionFee > 0 || loanInterest > 0) {
                        // 상장 전이거나 매도 전이라도 비용이 정산된 경우 처리
                        profit = -(taxAndSellFee + subscriptionFee + loanInterest);
                        if (profit < 0) {
                            profitText = profit.toLocaleString();
                            profitColor = 'text-[#60a5fa]';
                        }
                    }
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-[#1C1C20] transition border-b border-[#232329]";
                    tr.innerHTML = `
                        <td class="p-2.5 text-center text-slate-300">${item.account_owner || '-'}</td>
                        <td class="p-2.5 text-left font-medium text-white max-w-[200px] truncate underline decoration-[#5850EC] cursor-pointer hover:text-indigo-400" onclick="openEditModal('${encodeURIComponent(JSON.stringify(item))}')">
                            ${item.stock_name || '-'}
                        </td>
                        <td class="p-2.5 text-slate-300">${item.broker || '-'}</td>
                        <td class="p-2.5 text-center text-slate-400">${item.subscription_date || '-'}</td>
                        <td class="p-2.5 text-center text-slate-400">${item.listing_date || '-'}</td>
                        <td class="p-2.5 text-right text-slate-300">${allocatedQty.toLocaleString()}</td>
                        <td class="p-2.5 text-right text-slate-300">${offeringPrice.toLocaleString()}</td>
                        <td class="p-2.5 text-right text-slate-300">${sellingPrice > 0 ? sellingPrice.toLocaleString() : '-'}</td>
                        <td class="p-2.5 text-right text-slate-400">${taxAndSellFee.toLocaleString()}</td>
                        <td class="p-2.5 text-right text-slate-400">${subscriptionFee.toLocaleString()}</td>
                        <td class="p-2.5 text-right text-slate-400">${loanInterest.toLocaleString()}</td>
                        <td class="p-2.5 text-right pr-10 font-bold ${profitColor}">${profitText}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                // 페이지네이션 제어판 출력
                renderPagination(count, page);

                // 마지막 데이터 업데이트 시간 갱신
                updateLastUpdatedTime();
                
            } catch (err) {
                console.error("오류 발생:", err);
                tbody.innerHTML = `<tr><td colspan="12" class="p-4 text-center text-red-500">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>`;
                renderPagination(0, page);
            }
        }

        // 4. stock.html과 동일한 페이지네이션 UI 함수 (최대 5개 버튼 윈도잉 + 처음/끝 이동)
        function renderPagination(totalCount, currentPage) {
            const pagination = document.getElementById('pagination');
            if (!pagination) return;

            const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
            let html = ''; const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) startPage = Math.max(1, endPage - maxButtons + 1);

            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchIpoHistory(1)">«</button>`;
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchIpoHistory(${Math.max(1, currentPage - 1)})">‹</button>`;
            for (let i = startPage; i <= endPage; i++) {
                if (i > 0) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="fetchIpoHistory(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchIpoHistory(${Math.min(totalPages, currentPage + 1)})">›</button>`;
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchIpoHistory(${totalPages})">»</button>`;
            pagination.innerHTML = html;
        }

        // 5. 검색 조건 초기화 기능
        function resetFilters() {
            const elements = ['filter-date', 'filter-owner', 'filter-brokerage', 'filter-name'];
            elements.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            fetchIpoHistory(1);
        }

        // 6. 통계 탭(대시보드) 전체 조회용 로직 복구
        async function loadAllDataForDashboard() {
            try {
                const { data, error } = await clientSupabase
                    .from('tb_ipo_investment')
                    .select('*')
                    .order('subscription_date', { ascending: true });
                    
                if (error) throw error;
                
                currentFilteredData = data || [];
                updateDashboardStats();

                // 마지막 데이터 업데이트 시간 갱신
                updateLastUpdatedTime();
            } catch (err) {
                console.error("통계 로드 실패:", err);
            }
        }

        function updateDashboardStats() {
            const selectedYear = document.getElementById('chart-year-select')?.value;
            const selectedOwner = document.getElementById('chart-owner-select')?.value;
            const monthlyProfits = Array(12).fill(0);
            let totalYearProfit = 0;

            currentFilteredData.forEach(item => {
                if (!item.subscription_date) return;
                const date = new Date(item.subscription_date);

                const isYearMatch = date.getFullYear().toString() === selectedYear;
                const isOwnerMatch = !selectedOwner || item.account_owner === selectedOwner;

                if (isYearMatch && isOwnerMatch) {
                    const month = date.getMonth();

                    const allocatedQty = Number(item.allocated_qty || 0);
                    const offeringPrice = Number(item.offering_price || 0);
                    const sellingPrice = Number(item.selling_price || 0);
                    const taxAndSellFee = Number(item.tax_and_sell_fee || 0);
                    const subscriptionFee = Number(item.subscription_fee || 0);
                    const loanInterest = Number(item.loan_interest || 0);

                    if (sellingPrice > 0) {
                        const profit = ((sellingPrice - offeringPrice) * allocatedQty) - taxAndSellFee - subscriptionFee - loanInterest;
                        monthlyProfits[month] += profit;
                        totalYearProfit += profit;
                    }
                }
            });

            // 상단 그리드 월별 이익 매핑 및 색상 제어
            for (let i = 1; i <= 12; i++) {
                const cell = document.getElementById(`m${i}-profit`);
                if (cell) {
                    const val = monthlyProfits[i - 1];
                    cell.innerText = val !== 0 ? val.toLocaleString() : '0';
                    cell.className = "p-2.5 border-r border-[#232329] " + (val > 0 ? "text-[#f87171]" : (val < 0 ? "text-[#60a5fa]" : "text-slate-300"));
                }
            }

            const totalCell = document.getElementById('total-year-profit');
            if (totalCell) {
                totalCell.innerText = totalYearProfit.toLocaleString();
                totalCell.className = "p-2.5 font-bold " + (totalYearProfit > 0 ? "text-[#f87171]" : (totalYearProfit < 0 ? "text-[#60a5fa]" : "text-slate-300"));
            }

            // 차트 인스턴스 업데이트
            if (window.myChart) {
                window.myChart.data.datasets[0].data = monthlyProfits;
                window.myChart.update();
                window.myChart.resize();
            }
        }

        // 7. 모달 제어(등록 및 수정 기능 통합)

        /**
         * 실시간 입력창 천 단위 콤마 포맷팅 헬퍼 함수
         */
        function formatNumberInput(el) {
            let value = el.value.replace(/[^0-9]/g, '');
            if (!value || value === '0') {
                el.value = '0';
                return;
            }
            el.value = Number(value).toLocaleString();
        }

        /**
         * 포맷터 적용 값을 일반 숫자로 환원해주는 헬퍼 함수
         */
        function getRawNumberValue(id) {
            const el = document.getElementById(id);
            if (!el) return 0;
            return parseFloat(el.value.replace(/,/g, '')) || 0;
        }

        /**
         * 일반 숫자를 포맷된 스트링으로 주입해주는 헬퍼 함수
         */
        function setFormattedNumberValue(id, num) {
            const target = document.getElementById(id);
            if (target) {
                target.value = Number(num || 0).toLocaleString();
            }
        }

        function openRegisterModal() {
            document.getElementById('modal-title').innerHTML = '<i data-lucide="plus-circle" class="w-5 h-5 text-[#5850EC]"></i> 공모주 투자내역 등록';
            document.getElementById('form-id').value = '';
            document.getElementById('form-account-owner').value = 'man';
            document.getElementById('form-stock-name').value = '';
            document.getElementById('form-broker').value = '';

            document.getElementById('form-subscription-date').value = '';
            document.getElementById('form-refund-date').value = '';
            document.getElementById('form-listing-date').value = '';
            document.getElementById('form-sell-date').value = '';

            setFormattedNumberValue('form-offering-price', 0);
            setFormattedNumberValue('form-deposit-amount', 0);
            setFormattedNumberValue('form-subscription-qty', 0);
            setFormattedNumberValue('form-allocated-qty', 0);
            setFormattedNumberValue('form-sub-fee', 0);
            setFormattedNumberValue('form-selling-price', 0);
            setFormattedNumberValue('form-tax-fee', 0);
            setFormattedNumberValue('form-loan-interest', 0);

            document.getElementById('btn-delete-ipo').style.display = 'none';
            document.getElementById('register-modal').classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
        }

        function openEditModal(encodedItem) {
            const item = JSON.parse(decodeURIComponent(encodedItem));

            document.getElementById('modal-title').innerHTML = '<i data-lucide="pencil" class="w-5 h-5 text-[#5850EC]"></i> 공모주 투자내역 수정';
            document.getElementById('form-id').value = item.id || '';
            document.getElementById('form-account-owner').value = item.account_owner || 'man';
            document.getElementById('form-stock-name').value = item.stock_name || '';
            document.getElementById('form-broker').value = item.broker || '';

            document.getElementById('form-subscription-date').value = item.subscription_date || '';
            document.getElementById('form-refund-date').value = item.refund_date || '';
            document.getElementById('form-listing-date').value = item.listing_date || '';
            document.getElementById('form-sell-date').value = item.sell_date || '';

            setFormattedNumberValue('form-offering-price', item.offering_price);
            setFormattedNumberValue('form-deposit-amount', item.deposit_amount);
            setFormattedNumberValue('form-subscription-qty', item.subscription_qty);
            setFormattedNumberValue('form-allocated-qty', item.allocated_qty);
            setFormattedNumberValue('form-sub-fee', item.subscription_fee);
            setFormattedNumberValue('form-selling-price', item.selling_price);
            setFormattedNumberValue('form-tax-fee', item.tax_and_sell_fee);
            setFormattedNumberValue('form-loan-interest', item.loan_interest);

            document.getElementById('btn-delete-ipo').style.display = 'block';
            document.getElementById('register-modal').classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
        }

        function closeRegisterModal() {
            document.getElementById('register-modal').classList.add('hidden');
        }

        async function saveIpoData() {
            try {
                const id = document.getElementById('form-id').value;

                const record = {
                    account_owner: document.getElementById('form-account-owner').value,
                    stock_name: document.getElementById('form-stock-name').value,
                    broker: document.getElementById('form-broker').value,
                    offering_price: getRawNumberValue('form-offering-price'),

                    subscription_date: document.getElementById('form-subscription-date').value || null,
                    refund_date: document.getElementById('form-refund-date').value || null,
                    listing_date: document.getElementById('form-listing-date').value || null,
                    sell_date: document.getElementById('form-sell-date').value || null,

                    deposit_amount: getRawNumberValue('form-deposit-amount'),
                    subscription_qty: parseInt(getRawNumberValue('form-subscription-qty')) || 0,
                    allocated_qty: parseInt(getRawNumberValue('form-allocated-qty')) || 0,
                    subscription_fee: getRawNumberValue('form-sub-fee'),

                    selling_price: getRawNumberValue('form-selling-price'),
                    tax_and_sell_fee: getRawNumberValue('form-tax-fee'),
                    loan_interest: getRawNumberValue('form-loan-interest')
                };

                if (!record.stock_name || !record.broker || !record.subscription_date || !record.refund_date || !record.listing_date) {
                    alert("공모주명, 주관사 및 주요 일정 날짜 정보(청약/환불/상장일)는 필수 입력값입니다.");
                    return;
                }

                let result;
                if (id) {
                    result = await clientSupabase
                        .from('tb_ipo_investment')
                        .update(record)
                        .eq('id', id);

                    if (result.error) throw result.error;
                    alert("공모주 투자 데이터가 성공적으로 수정되었습니다.");
                } else {
                    result = await clientSupabase
                        .from('tb_ipo_investment')
                        .insert([record]);

                    if (result.error) throw result.error;
                    alert("공모주 투자 데이터가 정상적으로 등록되었습니다.");
                }

                closeRegisterModal();
                fetchIpoHistory(1);
                loadAllDataForDashboard();

            } catch (err) {
                console.error("데이터베이스 트랜잭션 예외 오류:", err);
                alert("저장 중 오류가 발생했습니다: " + err.message);
            }
        }

        async function deleteIpoData() {
            const id = document.getElementById('form-id').value;
            if (!id) return;

            if (!confirm("정말로 이 공모주 투자 내역을 삭제하시겠습니까?")) {
                return;
            }

            try {
                const { error } = await clientSupabase
                    .from('tb_ipo_investment')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                alert("성공적으로 삭제되었습니다.");
                closeRegisterModal();
                fetchIpoHistory(1);
                loadAllDataForDashboard();
            } catch (err) {
                console.error("데이터 삭제 쿼리 예외 발생:", err);
                alert("삭제 중 오류가 발생했습니다: " + err.message);
            }
        }

        // 8. 차트 시스템 렌더링 스크립트 기반 생성
        document.addEventListener('DOMContentLoaded', () => {
            const ctx = document.getElementById('monthlyChart')?.getContext('2d');
            if (!ctx) return;
            
            window.myChart = new Chart(ctx, {
                type: 'bar',
