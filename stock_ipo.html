<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식관리 시스템 - 공모주투자</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --vv-bg-main: #121212;
            --vv-bg-card: #2c2c2c;
            --vv-border: #3d3d3d;
            --vv-text-main: rgba(255, 255, 255, 0.95);
            --vv-text-muted: rgba(255, 255, 255, 0.65);
            --vv-text-mint: #03dac6;
            --point-blue: #3b82f6;
            --point-green: #2ecc71;
            --point-purple: #a855f7;
            --sidebar-width: 160px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--vv-bg-main); color: var(--vv-text-main); font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; height: 100vh; padding: 20px 10%; overflow: hidden; }

        /* 상단 네비게이션 바 */
        .top-section { display: flex; gap: 12px; height: 60px; margin-bottom: 12px; flex-shrink: 0; }
        .logo-box { width: var(--sidebar-width); height: 60px; border: 1px solid var(--vv-border); border-radius: 8px; display: flex; justify-content: center; align-items: center; background-color: var(--vv-bg-card); padding: 2px; overflow: hidden; }
        .logo-box a { color: var(--vv-text-mint); font-weight: bold; text-decoration: none; font-size: 16px; letter-spacing: 1px; }
        .header-menu { flex: 1; border: 1px solid var(--vv-border); border-radius: 8px; display: flex; background-color: var(--vv-bg-card); overflow: hidden; }
        .header-menu a { flex: 1; display: flex; justify-content: center; align-items: center; text-decoration: none; color: var(--vv-text-main); font-weight: 600; border-right: 1px solid var(--vv-border); transition: 0.2s; }
        .header-menu a.active { background-color: var(--point-blue); color: white; }

        /* 메인 레이아웃 및 사이드바 */
        .wrapper { display: flex; flex: 1; gap: 12px; overflow: hidden; }
        nav { width: var(--sidebar-width); border: 1px solid var(--vv-border); border-radius: 12px; padding: 15px 10px 20px 10px; display: flex; flex-direction: column; background-color: var(--vv-bg-card); }
        nav .nav-btn + .nav-btn { margin-top: 20px; }
        .nav-btn { width: 100%; padding: 12px 0; background: var(--vv-bg-main); border: 1px solid var(--vv-border); color: var(--vv-text-main); border-radius: 8px; cursor: pointer; font-weight: 600; }
        .nav-btn.active { background-color: var(--point-green); border-color: var(--point-green); color: white; }
		
		.sidebar-logo-box { width: 70%; height: 70px; display: flex; justify-content: center; align-items: center; margin: 0 auto 25px auto; overflow: hidden; border-radius: 8px; border: 1px solid var(--vv-border); background-color: var(--vv-bg-main); }
		.sidebar-logo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 콘텐츠 표시 영역 */
        main { flex: 1; border: 1px solid var(--vv-border); border-radius: 12px; background-color: var(--vv-bg-card); padding: 24px; display: flex; flex-direction: column; overflow: hidden; }
        .filter-container { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; background: var(--vv-bg-main); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--vv-border); margin-bottom: 20px; }
        .filter-item { display: flex; align-items: center; gap: 8px; }
        .filter-item label { color: var(--vv-text-mint); font-size: 13px; white-space: nowrap; }
        .filter-item input, .filter-item select { background: var(--vv-bg-card); border: 1px solid var(--vv-border); color: white; padding: 6px 10px; border-radius: 4px; font-size: 13px;}
        
        .button-group { margin-left: auto; display: flex; gap: 8px; }
        .btn { padding: 8px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
        .btn-blue { background-color: var(--point-blue); }
        .btn-indigo { background-color: var(--point-purple); }

        /* 데이터 테이블 스타일 */
        .table-area { flex: 1; overflow: auto; border: 1px solid var(--vv-border); border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { position: sticky; top: 0; background: #333; color: var(--vv-text-mint); font-size: 12px; padding: 12px 8px; border-bottom: 2px solid var(--vv-border); text-align: center; }
        td { padding: 10px 8px; border-bottom: 1px solid var(--vv-border); font-size: 13px; text-align: center; color: var(--vv-text-main); }
        tr:hover { background-color: rgba(255,255,255,0.03); }
		
		.col-stock-name { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
		.col-profit { padding-right: 20px !important; text-align: right !important; }

        /* 등록 및 수정 모달 팝업 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { position: absolute; background: var(--vv-bg-card); width: 950px; border-radius: 12px; border: 1px solid var(--vv-border); left: 50%; top: 10%; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { padding: 12px 16px; background: #333; border-bottom: 1px solid var(--vv-border); display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; color: var(--vv-text-muted); }
        .form-group input, .form-group select { background: var(--vv-bg-main); border: 1px solid var(--vv-border); color: white; padding: 8px; border-radius: 4px; font-size: 13px; }
        .modal-footer { padding: 16px; border-top: 1px solid var(--vv-border); display: flex; justify-content: flex-end; gap: 8px; }

        /* 테이블 하단 페이지네이션 */
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 20px; padding: 10px 0; user-select: none; flex-shrink: 0; }
        .page-btn { background-color: #333; border: 1px solid var(--vv-border); color: #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; min-width: 32px; text-align: center; transition: 0.2s; }
        .page-btn:hover:not(:disabled) { background-color: #444; color: white; border-color: var(--vv-text-mint); }
        .page-btn.active { background-color: var(--point-blue); color: white; border-color: var(--point-blue); font-weight: bold; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; background-color: #222; }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>

    <script>
        // =========================================================================
        // 1. Supabase 연동 클라이언트 및 글로벌 변수 선언 영역
        // =========================================================================
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l'; 
        
        const clientSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const PAGE_SIZE = 15;          // 데이터 그리드 테이블 출력 단위 행 개수
        let currentFilteredData = [];  // 통계판 연동에 활용되는 전체 데이터 백업 스토리지 배열

        /**
         * 실시간 입력창 천 단위 콤마 포맷팅 헬퍼 함수
         * @param {HTMLElement} el - input 요소 변수
         */
        function formatNumberInput(el) {
            // 숫자만 남기기
            let value = el.value.replace(/[^0-9]/g, '');
            if (!value || value === '0') {
                el.value = '0';
                return;
            }
            // 천 단위 콤마 추가
            el.value = Number(value).toLocaleString();
        }

        /**
         * 포맷터 적용 값을 일반 숫자로 환원해주는 헬퍼 함수
         * @param {string} id - 엘리먼트 아이디값
         */
        function getRawNumberValue(id) {
            const val = document.getElementById(id).value;
            return parseFloat(val.replace(/,/g, '')) || 0;
        }

        /**
         * 일반 숫자를 포맷된 스트링으로 주입해주는 헬퍼 함수
         * @param {string} id - 엘리먼트 아이디값
         * @param {number} num - 주입할 숫자값
         */
        function setFormattedNumberValue(id, num) {
            const target = document.getElementById(id);
            if (target) {
                const val = Number(num || 0);
                target.value = val.toLocaleString();
            }
        }

        /**
         * 화면단 서브메뉴 전환 처리기 함수
         * @param {string} viewName - 'status'(거래내역) 또는 'trade'(공모주투자현황)
         */
        function switchView(viewName) {
            const mainStatus = document.getElementById('main-status');
            const mainTrade = document.getElementById('main-trade');
            const btnStatus = document.getElementById('btn-status');
            const btnTrade = document.getElementById('btn-trade');

            if (viewName === 'status') {
                mainStatus.style.display = 'flex';
                mainTrade.style.display = 'none';
                btnStatus.classList.add('active');
                btnTrade.classList.remove('active');
            } else if (viewName === 'trade') {
                mainStatus.style.display = 'none';
                mainTrade.style.display = 'flex';
                btnStatus.classList.remove('active');
                btnTrade.classList.add('active');
                
                // 통계 대시보드로 이동 시 데이터 동기화 파이프라인 가동
                updateDashboardStats();
            }
        }

        // =========================================================================
        // 2. 데이터베이스 CRUD 및 필터 연동 기능 제어 비즈니스 로직
        // =========================================================================
        
        /**
         * 필터링 조건문 반영을 통한 데이터 베이스 목록 페이징 요청 제어 함수
         * @param {number} page - 탐색 대상 페이지 번호
         */
        async function fetchIpoHistory(page = 1) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = `<tr><td colspan="12">Supabase에서 데이터를 가져오는 중입니다...</td></tr>`;

            try {
                const filterDate = document.getElementById('filter-date').value; 
                const filterOwner = document.getElementById('filter-owner').value;
                const filterBrokerage = document.getElementById('filter-brokerage').value;
                const filterName = document.getElementById('filter-name').value;

                let query = clientSupabase
                    .from('tb_ipo_investment')
                    .select('*', { count: 'exact' });

                // 동적 파라미터 필터링 인젝션 처리
                if (filterOwner) {
                    query = query.eq('account_owner', filterOwner);
                }
                if (filterBrokerage) {
                    query = query.eq('broker', filterBrokerage);
                }
                if (filterName) {
                    query = query.ilike('stock_name', `%${filterName}%`);
                }
                // 월 경계선 조회 시 발생하는 오류를 수정한 다음 달 01일 미만(<) 처리 조건 로직
                if (filterDate) {
                    const [year, month] = filterDate.split('-');
                    const startRange = `${filterDate}-01`;
                    
                    let nextYear = parseInt(year);
                    let nextMonth = parseInt(month) + 1;
                    if (nextMonth > 12) {
                        nextMonth = 1;
                        nextYear += 1;
                    }
                    const endRange = `${nextYear}-${String(nextMonth).padStart(2, '0')}-01`;
                    
                    query = query.gte('subscription_date', startRange).lt('subscription_date', endRange);
                }

                // 시작 행 및 타겟 종료 행 오프셋 연산식 계산
                const from = (page - 1) * PAGE_SIZE;
                const to = from + PAGE_SIZE - 1;
                
                const { data, count, error } = await query
                    .order('subscription_date', { ascending: false })
                    .range(from, to);

                if (error) throw error;

                // 1페이지 호출 연동 시 백그라운드 데이터 메모리 캐시 동기화 동시 구동
                if (page === 1) {
                    await loadAllDataForDashboard();
                }

                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="12">조회된 공모주 투자 내역이 없습니다.</td></tr>`;
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(item => {
                    const allocatedQty = Number(item.allocated_qty || 0);
                    const offeringPrice = Number(item.offering_price || 0);
                    const sellingPrice = Number(item.selling_price || 0);
                    const taxAndSellFee = Number(item.tax_and_sell_fee || 0);
                    const subscriptionFee = Number(item.subscription_fee || 0);
                    const loanInterest = Number(item.loan_interest || 0);

                    // 손수익 최종 가치 산출 연산 공식
                    let profit = 0;
                    if (sellingPrice > 0) {
                        profit = ((sellingPrice - offeringPrice) * allocatedQty) - taxAndSellFee - subscriptionFee - loanInterest;
                    }

                    const profitColor = profit > 0 ? 'var(--point-green)' : (profit < 0 ? '#e74c3c' : 'var(--vv-text-main)');
                    const profitText = profit >= 0 ? `+${profit.toLocaleString()}` : profit.toLocaleString();

                    // Object 구조체를 가공하기 위해 안전하게 이스케이프 포맷 변환 인코딩
                    const itemJson = encodeURIComponent(JSON.stringify(item));
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.account_owner}</td>
                        <td class="col-stock-name" title="${item.stock_name}" 
                            style="cursor: pointer; text-decoration: underline; color: var(--point-blue);" 
                            onclick="openEditModal('${itemJson}')">
                            ${item.stock_name}
                        </td>
                        <td>${item.broker}</td>
                        <td>${item.subscription_date || '-'}</td>
                        <td>${item.listing_date || '-'}</td>
                        <td>${allocatedQty.toLocaleString()}</td>
                        <td>${offeringPrice.toLocaleString()}</td>
                        <td>${sellingPrice > 0 ? sellingPrice.toLocaleString() : '-'}</td>
                        <td>${taxAndSellFee.toLocaleString()}</td>
                        <td>${subscriptionFee.toLocaleString()}</td>
                        <td>${loanInterest.toLocaleString()}</td>
                        <td class="col-profit" style="color: ${profitColor}; font-weight: bold;">${profitText}</td>
                    `;
                    tbody.appendChild(tr);
                });

                renderPagination(count, page);

            } catch (err) {
                console.error("데이터 로드 오류:", err);
                tbody.innerHTML = `<tr><td colspan="12" style="color: #e74c3c;">데이터를 가져오는 중 오류가 발생했습니다: ${err.message}</td></tr>`;
            }
        }

        /**
         * 통계 연동용 실시간 원본 전체 레코드 스토리지 동기화 함수
         */
        async function loadAllDataForDashboard() {
            try {
                const { data, error } = await clientSupabase
                    .from('tb_ipo_investment')
                    .select('*');
                if (!error && data) {
                    currentFilteredData = data;
                    if(document.getElementById('main-trade').style.display !== 'none') {
                        updateDashboardStats();
                    }
                }
            } catch (e) {
                console.error("대시보드 원본 데이터 연동 실패:", e);
            }
        }

        /**
         * 선택된 연도 데이터 추출을 기반으로 대시보드 통계판 및 Chart 인스턴스 갱신 함수
         */
        function updateDashboardStats() {
            const selectedYear = document.getElementById('chart-year-select').value;
			const selectedOwner = document.getElementById('chart-owner-select').value;
            const monthlyProfits = Array(12).fill(0);
            let totalYearProfit = 0;

            currentFilteredData.forEach(item => {
                if (!item.subscription_date) return;
                const date = new Date(item.subscription_date);
                if (date.getFullYear().toString() === selectedYear && item.account_owner === selectedOwner) {
                    const month = date.getMonth(); 
                    
                    const allocatedQty = Number(item.allocated_qty || 0);
                    const offeringPrice = Number(item.offering_price || 0);
                    const sellingPrice = Number(item.selling_price || 0);
                    const taxAndSellFee = Number(item.tax_and_sell_fee || 0);
                    const subscriptionFee = Number(item.subscription_fee || 0);
                    const loanInterest = Number(item.loan_interest || 0);

                    if (sellingPrice > 0) {
                        const profit = ((sellingPrice - offeringPrice) * allocatedQty) - taxAndSellFee - subscriptionFee - loanInterest;
                        monthlyProfits[month] += profit;
                        totalYearProfit += profit;
                    }
                }
            });

            // 상단 그리드 월별 이익 매핑 및 색상 제어 흐름
            for (let i = 1; i <= 12; i++) {
                const cell = document.getElementById(`m${i}-profit`);
                if (cell) {
                    const val = monthlyProfits[i-1];
                    cell.innerText = val !== 0 ? val.toLocaleString() : '0';
                    cell.style.color = val > 0 ? 'var(--point-green)' : (val < 0 ? '#e74c3c' : 'var(--vv-text-main)');
                }
            }
            
            const totalCell = document.getElementById('total-year-profit');
            totalCell.innerText = totalYearProfit.toLocaleString();
            totalCell.style.color = totalYearProfit > 0 ? 'var(--point-green)' : (totalYearProfit < 0 ? '#e74c3c' : 'var(--vv-text-main)');

            // Chart 컴포넌트 렌더링 동적 리프레시 명령 시그널 전송
            if (window.myChart) {
                window.myChart.data.datasets[0].data = monthlyProfits;
                window.myChart.update();
                window.myChart.resize();
            }
        }

        /**
         * 페이징 인덱스 인터페이스 렌더링 콤포넌트 생성기
         */
        function renderPagination(totalCount, currentPage) {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            
            const totalPages = Math.ceil(totalCount / PAGE_SIZE);
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = '이전';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => fetchIpoHistory(currentPage - 1);
            container.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.innerText = i;
                pageBtn.onclick = () => fetchIpoHistory(i);
                container.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = '다음';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => fetchIpoHistory(currentPage + 1);
            container.appendChild(nextBtn);
        }

        // =========================================================================
        // 3. 모달 인풋 필드 상태값 핸들링 및 데이터 C.U.D 처리 파트
        // =========================================================================
        
        /**
         * 신규 생성 폼 데이터 노드 입력창 오픈 함수 (콤마 반영 형식 변경)
         */
        function openRegisterModal() {
            document.getElementById('form-id').value = '';
            document.getElementById('form-stock-name').value = '';
            document.getElementById('form-broker').value = '';
            
            document.getElementById('form-subscription-date').value = '';
            document.getElementById('form-refund-date').value = '';
            document.getElementById('form-listing-date').value = '';
            document.getElementById('form-sell-date').value = '';
            
            // 콤마 형식 도우미 적용 주입
            setFormattedNumberValue('form-offering-price', 0);
            setFormattedNumberValue('form-deposit-amount', 0);
            setFormattedNumberValue('form-subscription-qty', 0);
            setFormattedNumberValue('form-allocated-qty', 0);
            setFormattedNumberValue('form-sub-fee', 0);
            setFormattedNumberValue('form-selling-price', 0);
            setFormattedNumberValue('form-tax-fee', 0);
            setFormattedNumberValue('form-loan-interest', 0);
            
            document.getElementById('modal-title').innerText = "공모주 투자내역 등록";
            document.getElementById('btn-delete-ipo').style.display = 'none'; 
            document.getElementById('register-modal').style.display = 'block';
        }
        
        /**
         * 수정 액션을 위한 데이터 역바인딩 및 모달 필드 동적 활성화 함수 (콤마 반영 형식 변경)
         * @param {string} itemJsonStr - 역직렬화 대상 로우 정보 텍스트 스트링
         */
        function openEditModal(itemJsonStr) {
            const item = JSON.parse(decodeURIComponent(itemJsonStr));
            
            document.getElementById('form-id').value = item.id; 
            document.getElementById('form-account-owner').value = item.account_owner;
            document.getElementById('form-stock-name').value = item.stock_name;
            document.getElementById('form-broker').value = item.broker;
            
            document.getElementById('form-subscription-date').value = item.subscription_date || '';
            document.getElementById('form-refund-date').value = item.refund_date || '';
            document.getElementById('form-listing-date').value = item.listing_date || '';
            document.getElementById('form-sell-date').value = item.sell_date || '';
            
            // 콤마 형식 도우미 적용 주입
            setFormattedNumberValue('form-offering-price', item.offering_price);
            setFormattedNumberValue('form-deposit-amount', item.deposit_amount);
            setFormattedNumberValue('form-subscription-qty', item.subscription_qty);
            setFormattedNumberValue('form-allocated-qty', item.allocated_qty);
            setFormattedNumberValue('form-sub-fee', item.subscription_fee);
            setFormattedNumberValue('form-selling-price', item.selling_price);
            setFormattedNumberValue('form-tax-fee', item.tax_and_sell_fee);
            setFormattedNumberValue('form-loan-interest', item.loan_interest);
            
            document.getElementById('modal-title').innerText = "공모주 투자내역 수정";
            document.getElementById('btn-delete-ipo').style.display = 'block'; 
            document.getElementById('register-modal').style.display = 'block';
        }

        /**
         * 모달 창 닫기 기능 수행 함수
         */
        function closeRegisterModal() {
            document.getElementById('register-modal').style.display = 'none';
        }

        /**
         * 공모주 데이터 처리 통합 쿼리 가동 함수 (ID의 유무를 통한 조건 분기형 처리)
         */
        async function saveIpoInvestment() {
            try {
                const id = document.getElementById('form-id').value; 

                // 콤마가 제거된 실숫값을 정제 추출하는 헬퍼 가동
                const record = {
                    account_owner: document.getElementById('form-account-owner').value,
                    stock_name: document.getElementById('form-stock-name').value,
                    broker: document.getElementById('form-broker').value,
                    offering_price: getRawNumberValue('form-offering-price'),
                    
                    subscription_date: document.getElementById('form-subscription-date').value || null,
                    refund_date: document.getElementById('form-refund-date').value || null,
                    listing_date: document.getElementById('form-listing-date').value || null,
                    sell_date: document.getElementById('form-sell-date').value || null,
                    
                    deposit_amount: getRawNumberValue('form-deposit-amount'),
                    subscription_qty: parseInt(getRawNumberValue('form-subscription-qty')) || 0,
                    allocated_qty: parseInt(getRawNumberValue('form-allocated-qty')) || 0,
                    subscription_fee: getRawNumberValue('form-sub-fee'),
                    
                    selling_price: getRawNumberValue('form-selling-price'),
                    tax_and_sell_fee: getRawNumberValue('form-tax-fee'),
                    loan_interest: getRawNumberValue('form-loan-interest')
                };

                if (!record.stock_name || !record.broker || !record.subscription_date || !record.refund_date || !record.listing_date) {
                    alert("공모주명, 주관사 및 주요 일정 날짜 정보(청약/환불/상장일)는 필수 입력값입니다.");
                    return;
                }

                let result;
                if (id) {
                    result = await clientSupabase
                        .from('tb_ipo_investment')
                        .update(record)
                        .eq('id', id);
                        
                    if (result.error) throw result.error;
                    alert("공모주 투자 데이터가 성공적으로 수정되었습니다.");
                } else {
                    result = await clientSupabase
                        .from('tb_ipo_investment')
                        .insert([record]);
                        
                    if (result.error) throw result.error;
                    alert("공모주 투자 데이터가 정상적으로 등록되었습니다.");
                }

                closeRegisterModal();
                fetchIpoHistory(1); 
                
            } catch (err) {
                console.error("데이터베이스 트랜잭션 예외 오류:", err);
                alert("저장 중 오류가 발생했습니다: " + err.message);
            }
        }
        
        /**
         * 타겟 레코드 완전 파기 삭제 트랜잭션 쿼리 수행 함수
         */
        async function deleteIpoInvestment() {
            const id = document.getElementById('form-id').value;
            if (!id) return;

            if (!confirm("정말로 이 공모주 투자 내역을 삭제하시겠습니까?")) {
                return;
            }

            try {
                const { error } = await clientSupabase
                    .from('tb_ipo_investment')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                alert("성공적으로 삭제되었습니다.");
                closeRegisterModal();
                fetchIpoHistory(1); 
            } catch (err) {
                console.error("데이터 삭제 쿼리 예외 발생:", err);
                alert("삭제 중 오류가 발생했습니다: " + err.message);
            }
        }

        // =========================================================================
        // 4. 애플리케이션 초기화 시동 스크립트 핸들러 엔진 파트
        // =========================================================================
        window.onload = function() {
            switchView('status');
            fetchIpoHistory(1);

            const ctx = document.getElementById('monthlyChart').getContext('2d');
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'],
                    datasets: [{
                        label: '월별 수익금',
                        data: Array(12).fill(0),
                        backgroundColor: function(context) {
                            const val = context.raw;
                            return val >= 0 ? '#3b82f6' : '#e74c3c'; 
                        },
                        borderRadius: 4,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { family: 'Pretendard', weight: 'bold' } }
                        },
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: 'rgba(255, 255, 255, 0.7)', font: { family: 'Pretendard', weight: 'bold' } }
                        }
                    }
                }
            });
        };
    </script>
</body>
