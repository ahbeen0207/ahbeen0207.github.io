<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Service</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l';
        
        let _supabase;
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase 로드 실패:", e);
        }

        /**
         * [기기 체크] 모바일 접속 확인 후 리다이렉트
         */
        function checkMobileRedirect() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase());
            
            if (isMobile) {
                window.location.replace('m.select_page.html');
            }
        }

        // 인증 체크 전에 모바일 여부를 먼저 확인하여 튕겨내기 처리
        checkMobileRedirect();

        /**
         * [개선된 분기 로직] 인증 상태 실시간 감지 및 체크
         */
        function initAuthCheck() {
            if (!_supabase) return;

            _supabase.auth.onAuthStateChange((event, session) => {
                const isLoggedIn = localStorage.getItem('isLoggedIn');

                if (session && isLoggedIn === 'true') {
                    document.documentElement.style.display = 'block';
                } else {
                    const currentFile = window.location.pathname.split('/').pop() || 'select_page.html';
                    window.location.replace(`index.html?redirect=${encodeURIComponent(currentFile)}`);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initAuthCheck);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        html { display: none; }

        body { 
            margin: 0; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', 'Noto Sans KR', 'Pretendard', sans-serif; 
            display: flex;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(1, 1fr);
            gap: 20px; 
            width: 90%; 
            max-width: 1100px; 
            padding: 60px 0 60px 0; /* 상하단 버튼 영역 여유 확보 */
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1024px) {
            .container { grid-template-columns: repeat(4, 1fr); }
        }

        .card { 
            height: 340px; 
            border-radius: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            text-decoration: none; 
            color: white; 
            border: 2px solid transparent; 
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease; 
            padding: 20px; 
            cursor: pointer; 
            box-sizing: border-box;
        }

        .card:hover { 
            transform: translateY(-10px); 
            border-color: #ffffff; 
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }
        
        .icon { font-size: 44px; margin-bottom: 15px; user-select: none; }
        
        .card-blue { 
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.07) 30%, transparent 30%),
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.04) 50%, transparent 50%),
                linear-gradient(180deg, #0284c7, #0369a1); 
        }

        .card-pink { 
            background: 
                linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.03) 75%),
                linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.03) 75%),
                linear-gradient(180deg, #db2777, #be185d);
            background-position: 0 0, 15px 15px;
            background-size: 30px 30px, 30px 30px;
        }

        .card-orange { 
            background: 
                linear-gradient(135deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.05) 75%, transparent 75%, transparent),
                linear-gradient(180deg, #ea580c, #c2410c); 
            background-size: 40px 40px;
        }

        .card-green { 
            background: 
                linear-gradient(315deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.04) 40%, transparent 40%),
                linear-gradient(180deg, #16a34a, #15803d); 
        }
        
        .card h3 {
            width: 80%;
            padding: 12px 0;
            margin: 15px 0 5px 0;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 4px 6px rgba(0, 0, 0, 0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .card-blue h3   { background: linear-gradient(180deg, #38bdf8, #0284c7); border: 1px solid #0369a1; }
        .card-pink h3   { background: linear-gradient(180deg, #f472b6, #db2777); border: 1px solid #be185d; }
        .card-orange h3 { background: linear-gradient(180deg, #fb923c, #ea580c); border: 1px solid #c2410c; }
        .card-green h3  { background: linear-gradient(180deg, #4ade80, #16a34a); border: 1px solid #15803d; }

        .card p {
            margin: 5px 0 0 0;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* 우측 상단 Mobile 버튼 */
        .mobile-link {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            color: #888; 
            text-decoration: none; 
            font-size: 14px; 
            transition: color 0.2s, border-color 0.2s;
            font-weight: 700;
            padding: 5px 12px;
            border: 1px solid #444;
            border-radius: 6px;
        }
        .mobile-link:hover { color: #fff; border-color: #fff; }

        /* [변경] 우측 하단 고정 Logout 버튼 */
        .logout-link { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            color: #888; 
            text-decoration: none; 
            font-size: 14px; 
            transition: color 0.2s;
            font-weight: 700;
            padding: 5px 10px;
            z-index: 1000;
        }
        .logout-link:hover { color: #fff; }
    </style>
</head>
<body>
    <a href="m.select_page.html" class="mobile-link">Mobile</a>

    <div class="container">
        <a href="dashboard.html" class="card card-blue">
            <div class="icon">💰</div>
            <h3>자산현황</h3>
            <p>Dashboard</p>
        </a>

        <a href="stock.html" class="card card-pink">
            <div class="icon">📈</div> 
            <h3>주식투자</h3>
            <p>Stock</p>
        </a>

        <a href="stock_ipo.html" class="card card-orange">
            <div class="icon">📄</div>
            <h3>공모주투자</h3>
            <p>IPO</p>
        </a>

        <a href="deposit.html" class="card card-green">
            <div class="icon">🏦</div>
            <h3>예·적금</h3>
            <p>Deposit</p>
        </a>
    </div>

    <a href="#" class="logout-link" onclick="logout(event)">Logout</a>

    <script>
        async function logout(e) {
            if(e) e.preventDefault();
            if (!_supabase) return;

            try {
                await _supabase.auth.signOut();
                localStorage.removeItem('isLoggedIn');
                window.location.replace('index.html');
            } catch (error) {
                console.error("로그아웃 중 오류 발생:", error.message);
                localStorage.removeItem('isLoggedIn');
                window.location.replace('index.html');
            }
        }
    </script>
</body>
</html>
