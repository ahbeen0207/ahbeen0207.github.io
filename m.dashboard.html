<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식관리 시스템 - 모바일 대시보드</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --vv-bg-main: #0E0E10;
            --vv-bg-card: #18181C;
            --vv-bg-input: #141416;
            --vv-border: #232329;
            --vv-text-main: #E4E4E7;
            --vv-text-muted: #A1A1AA;
            --vv-text-mint: #A1A1AA;
            --point-blue: #5850EC;
            --point-green: #34D399;
            
            /* 자산별 테마 색상 (PC dashboard.html과 동일) */
            --color-total: #ff0000;
            --color-stock: #ff00bf;
            --color-bond: #00b050;
            --color-cash: #7030a0;
            --color-gold: #0070c0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--vv-bg-main); 
            color: var(--vv-text-main); 
            font-family: 'Pretendard', sans-serif; 
            padding: 12px; 
            min-height: 100vh;
        }

        /* 모바일 상단 네비게이션 바 */
        .top-section { 
            display: flex; 
            flex-direction: column;
            gap: 8px; 
            margin-bottom: 15px; 
        }
        
        .header-menu { 
            border: 1px solid var(--vv-border); 
            border-radius: 8px; 
            display: flex; 
            background-color: var(--vv-bg-card); 
            overflow: hidden; 
            width: 100%;
        }
        
        .header-menu a { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-decoration: none; 
            color: var(--vv-text-main); 
            font-weight: 600; 
            font-size: 13px;
            padding: 12px 0;
            border-right: 1px solid var(--vv-border); 
            transition: 0.2s; 
            text-align: center;
        }
        
        .header-menu a:last-child { border-right: none; }
        .header-menu a.active { background-color: var(--point-blue); color: white; }
        .header-menu a.home-btn { color: var(--point-blue); }

        /* 메인 콘텐츠 영역 (사이드바 제거로 단일 배치) */
        main { 
            width: 100%;
        }
        
        /* 모바일용 자산 요약 카드 그리드 (화면 폭에 따라 1~2열 자동 대응) */
        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(1, 1fr); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        
        @media (min-width: 480px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .summary-card { 
            background: var(--vv-bg-card); 
            border: 1px solid var(--vv-border); 
            border-radius: 12px; 
            padding: 14px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        
        /* 자산별 뱃지 구조 스타일 */
        .card-badge-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            align-items: center; 
            margin-bottom: 12px; 
        }
        
        .card-label { 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            height: 32px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: bold; 
            color: #fff; 
            width: 100%; 
            text-shadow: 0 1px 2px rgba(0,0,0,0.5); 
        }
        
        .card-ratio { 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            height: 32px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: bold; 
            color: #fff; 
            background-color: rgba(255,255,255,0.1); 
            border: 1px solid var(--vv-border);
            width: 100%; 
        }
        
        .card-value { 
            font-size: 18px; 
            font-weight: bold; 
            color: #fff; 
            text-align: right; 
            padding-right: 4px; 
        }
        
        /* 뱃지 컬러 클래스 */
        .bg-total { background-color: var(--color-total); }
        .bg-stock { background-color: var(--color-stock); }
        .bg-bond { background-color: var(--color-bond); }
        .bg-cash { background-color: var(--color-cash); }
        .bg-gold { background-color: var(--color-gold); }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="header-menu">
            <a href="m.select_page.html" class="home-btn">홈</a>
            <a href="#" class="active">자산현황</a>
            <a href="m.stock.html">주식</a>
            <a href="m.stock_ipo.html">공모주</a>
            <a href="m.deposit.html">예적금</a>
        </div>
    </div>

    <main id="main-dashboard">
        <div class="summary-grid">
            <div class="summary-card">
                <div class="card-badge-row">
                    <span class="card-label bg-total">총자산</span>
                    <span class="card-ratio">100%</span>
                </div>
                <div id="db-val-total" class="card-value">0 원</div>
            </div>
            
            <div class="summary-card">
                <div class="card-badge-row">
                    <span class="card-label bg-stock">주식</span>
                    <span id="db-ratio-stock" class="card-ratio">0%</span>
                </div>
                <div id="db-val-stock" class="card-value">0 원</div>
            </div>
            
            <div class="summary-card">
                <div class="card-badge-row">
                    <span class="card-label bg-bond">채권</span>
                    <span id="db-ratio-bond" class="card-ratio">0%</span>
                </div>
                <div id="db-val-bond" class="card-value">0 원</div>
            </div>
            
            <div class="summary-card">
                <div class="card-badge-row">
                    <span class="card-label bg-cash">현금</span>
                    <span id="db-ratio-cash" class="card-ratio">0%</span>
                </div>
                <div id="db-val-cash" class="card-value">0 원</div>
            </div>
            
            <div class="summary-card">
                <div class="card-badge-row">
                    <span class="card-label bg-gold">기타(금은)</span>
                    <span id="db-ratio-gold" class="card-ratio">0%</span>
                </div>
                <div id="db-val-gold" class="card-value">0 원</div>
            </div>
        </div>
    </main>

    <script>
        // Supabase 초기화 설정
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let calculatedAssets = { total: 0, stock: 0, bond: 0, cash: 0, gold: 0 };

        function normalizeAssetType(rawType) {
            if (!rawType) return '현금';
            const str = rawType.trim();
            if (str.includes('주식')) return '주식';
            if (str.includes('채권')) return '채권';
            if (str.includes('금') || str.includes('은')) return '금은';
            if (str.includes('현금') || str.includes('예금') || str.includes('적금')) return '현금';
            return '주식';
        }

        /**
         * PC 버전(dashboard.html)과 완벽히 일치하도록 수정한 실시간 자산 정산 함수
         */
        async function fetchDashboardData() {
            try {
                // PC 대시보드와 동일하게 실시간 현황 뷰(tb_realtime_stock_status) 및 유지 상태인 예적금 가져오기
                const [stockRes, depositRes] = await Promise.all([
                    _supabase.from('tb_realtime_stock_status').select('*'),
                    _supabase.from('deposit_management').select('*').eq('status', '유지')
                ]);

                if (stockRes.error) throw stockRes.error;
                if (depositRes.error) throw depositRes.error;

                let stockSum = 0;
                let bondSum = 0;
                let cashSum = 0;
                let goldSum = 0;

                // 1. 주식 현황 데이터 집계 및 타입 정규화 매핑
                if (stockRes.data && stockRes.data.length > 0) {
                    stockRes.data.forEach(item => {
                        const type = normalizeAssetType(item.asset_type);
                        const evalAmount = parseFloat(item.eval_amount || 0);

                        if (type === '주식') stockSum += evalAmount;
                        else if (type === '채권') bondSum += evalAmount;
                        else if (type === '금은') goldSum += evalAmount;
                        else if (type === '현금') cashSum += evalAmount;
                    });
                }

                // 2. 예적금 원장 데이터 반영 (PC와 동일하게 amount 컬럼 사용)
                if (depositRes.data && depositRes.data.length > 0) {
                    depositRes.data.forEach(item => {
                        const depositAmount = parseFloat(item.amount || 0);
                        cashSum += depositAmount;
                    });
                }

                // 정수 단위 반올림 및 계산
                calculatedAssets.stock = Math.max(0, Math.round(stockSum));
                calculatedAssets.bond = Math.max(0, Math.round(bondSum));
                calculatedAssets.cash = Math.max(0, Math.round(cashSum));
                calculatedAssets.gold = Math.max(0, Math.round(goldSum));
                calculatedAssets.total = calculatedAssets.stock + calculatedAssets.bond + calculatedAssets.cash + calculatedAssets.gold;

                // UI 렌더링 업데이트
                renderSummaryUI();

            } catch (err) {
                console.error("❌ 모바일 대시보드 데이터 로딩 실패:", err);
            }
        }

        function updateTextSafe(id, text) {
            const el = document.getElementById(id);
            if (el) el.innerText = text;
        }

        /**
         * 수집 완료된 금액 및 비율을 모바일 UI 카드에 렌더링
         */
        function renderSummaryUI() {
            const assets = calculatedAssets;
            const total = assets.total || 1;

            updateTextSafe('db-ratio-stock', ((assets.stock / total) * 100).toFixed(1) + '%');
            updateTextSafe('db-ratio-bond', ((assets.bond / total) * 100).toFixed(1) + '%');
            updateTextSafe('db-ratio-cash', ((assets.cash / total) * 100).toFixed(1) + '%');
            updateTextSafe('db-ratio-gold', ((assets.gold / total) * 100).toFixed(1) + '%');

            updateTextSafe('db-val-total', assets.total.toLocaleString() + ' 원');
            updateTextSafe('db-val-stock', assets.stock.toLocaleString() + ' 원');
            updateTextSafe('db-val-bond', assets.bond.toLocaleString() + ' 원');
            updateTextSafe('db-val-cash', assets.cash.toLocaleString() + ' 원');
            updateTextSafe('db-val-gold', assets.gold.toLocaleString() + ' 원');
        }

        // 페이지 진입 즉시 실시간 데이터 갱신
        window.addEventListener('DOMContentLoaded', () => {
            fetchDashboardData();
        });
    </script>
</body>
</html>
