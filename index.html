<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자산관리 포털 - 로그인</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        h2 { color: #10b981; margin-bottom: 30px; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: white;
            box-sizing: border-box;
        }
        .remember-id {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 20px;
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
        }
        .remember-id input { margin-right: 8px; cursor: pointer; }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #10b981;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #059669; }
        #message { margin-top: 15px; font-size: 14px; color: #ef4444; min-height: 20px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>자산관리 포털</h2>
    <input type="email" id="email" placeholder="이메일 주소">
    <input type="password" id="password" placeholder="비밀번호">
    
    <label class="remember-id">
        <input type="checkbox" id="saveId"> 아이디 저장
    </label>

    <button onclick="signIn()">로그인</button>
    <div id="message"></div>
</div>

<script>
    const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l'; // 반드시 본인의 키로 교체하세요
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 페이지 로드 시 저장된 아이디 불러오기
    window.onload = function() {
        const savedEmail = localStorage.getItem('savedEmail');
        if (savedEmail) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('saveId').checked = true;
        }
    };

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const saveIdChecked = document.getElementById('saveId').checked;
        const messageDiv = document.getElementById('message');

        // 아이디 저장 로직
        if (saveIdChecked) {
            localStorage.setItem('savedEmail', email);
        } else {
            localStorage.removeItem('savedEmail');
        }

        const { data, error } = await _supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            messageDiv.innerText = "로그인 실패: " + error.message;
        } else {
            messageDiv.style.color = "#10b981";
            messageDiv.innerText = "로그인 성공! 이동 중...";
            setTimeout(() => {
                location.href = 'dashboard.html';
            }, 1000);
        }
    }
</script>

</body>
</html>
