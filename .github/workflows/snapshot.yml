name: Monthly Asset Snapshot Cron Job

on:
  schedule:
    # 💡 한국 시간(UTC+9) 매월 1일 오전 10시 정각에 자동으로 실행되도록 변경 (에러 방지 표준 문법)
    - cron: '0 1 * 1-12 *'
  workflow_dispatch: # 웹 화면에서 수동 실행 버튼을 활성화해 주는 필수 옵션

jobs:
  run-snapshot-job:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v3

      - name: 노드JS 환경 세팅
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 필요한 라이브러리 가상서버에 다운로드
        run: |
          npm init -y
          npm install @supabase/supabase-js node-fetch

      - name: 스크립트 실행 (깃허브 비밀 키를 소스코드 내부 env로 전달)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MY_USER_ID: ${{ secrets.MY_USER_ID }}
        run: node cron_snapshot.js
