name: Monthly Asset Snapshot Cron Job

on:
  schedule:
    # 한국 시간 매월 1일 오전 10시 자동 실행
    - cron: '0 1 * 1-12 *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  run-snapshot-job:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 노드JS 최신 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 기존 20에서 22로 버전을 변경합니다.

      - name: 필요한 라이브러리 가상서버에 다운로드
        run: |
          npm init -y
          npm install @supabase/supabase-js node-fetch

      - name: 스크립트 실행 (깃허브 비밀 키를 소스코드 내부 env로 전달)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MY_USER_ID: ${{ secrets.MY_USER_ID }}
        run: node cron_snapshot.js
