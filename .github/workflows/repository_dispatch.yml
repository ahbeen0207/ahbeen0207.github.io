name: 10-Minute Realtime Asset Update Cron

on:
  repository_dispatch:
    types: [run-sync-asset]
  workflow_dispatch:

# ─── 💡 [이 부분 3줄을 추가해 주세요] ───
permissions:
  contents: read # 가상 서버가 소스코드를 읽을 수 있도록 권한 부여
# ───────────────────────────────────────

jobs:
  update-realtime-data:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4
        
      - name: 노드JS 최신 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: 필요한 라이브러리 가상서버에 다운로드
        run: |
          npm init -y
          npm install @supabase/supabase-js node-fetch@2
          
      - name: 스크립트 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MY_USER_ID: ${{ secrets.MY_USER_ID }}
        run: node update-script.js
