<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식관리 시스템 - 대시보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #0E0E10;
        }
        .sidebar-bg {
            background-color: #141416;
            border-left: 1px solid #232329;
            border-right: 1px solid #232329;
        }
        /* 중앙 80% 인터페이스의 가장 우측 경계선 스타일 정의 */
        .content-frame {
            border-right: 1px solid #232329;
        }
        .card-bg {
            background-color: #18181C;
            border: 1px solid #232329;
        }
        .input-bg {
            background-color: #111114;
            border: 1px solid #232329;
        }
        
        /* 브라우저 메인 및 메인프레임 우측 전체 스크롤바 숨기기 기능 */
        .no-scrollbar::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* 데이터 테이블 내부 전용 가로 스크롤바 스타일 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #141416;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2D2D35;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3E3E4A;
        }

        :root {
            /* 대시보드 전용 자산별 테마 색상 */
            --color-total: #ff0000;
            --color-stock: #ff00bf;
            --color-bond: #00b050;
            --color-cash: #7030a0;
            --color-gold: #0070c0;
        }

        /* 대시보드 상단 요약 카드 그리드 */
        .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; flex-shrink: 0; }
        .summary-card { background: #18181C; border: 1px solid #232329; border-radius: 12px; padding: 12px 14px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* 자산별 상단 메뉴 배지 구조 일치화 */
        .card-badge-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; align-items: center; margin-bottom: 12px; }
        .card-label { display: inline-flex; justify-content: center; align-items: center; height: 32px; border-radius: 6px; font-size: 14.4px; font-weight: bold; color: #fff; width: 100%; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .card-ratio { display: inline-flex; justify-content: center; align-items: center; height: 32px; border-radius: 6px; font-size: 14.4px; font-weight: bold; color: #fff; background-color: rgba(255,255,255,0.1); border: 1px solid #232329; width: 100%; }
        .card-value { font-size: 16px; font-weight: bold; color: #fff; text-align: right; padding-right: 4px; }
        
        /* 뱃지 컬러 클래스 매칭 */
        .bg-total { background-color: var(--color-total); }
        .bg-stock { background-color: var(--color-stock); }
        .bg-bond { background-color: var(--color-bond); }
        .bg-cash { background-color: var(--color-cash); }
        .bg-gold { background-color: var(--color-gold); }

        /* 콘텐츠 내부 영역 상자 */
        .content-box { flex: 1; border: 1px solid #232329; border-radius: 8px; background-color: #111114; padding: 15px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        /* 트리맵 구조 스타일 지정 */
        .treemap-wrapper { flex: 1; width: 100%; height: 100%; position: relative; background-color: #111114; overflow: hidden; }
        
        /* 트리맵 내 텍스트 크기 확대 조정 */
        .tm-block { position: absolute; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 10px; font-family: 'Inter', 'Noto Sans KR', sans-serif; transition: opacity 0.2s; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.2); }
        .tm-block:hover { opacity: 0.9; }
        .tm-title { font-size: 27px; font-weight: bold; margin-bottom: 9px; }
        .tm-ratio { font-size: 21px; margin-bottom: 6px; opacity: 0.9; }
        .tm-val { font-size: 22.5px; font-weight: 500; }

        /* 그래프 화면용 상단 필터/옵션 바 */
        .graph-filter-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; font-size: 13px; color: #fff; }
        .checkbox-group { display: flex; align-items: center; gap: 16px; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .checkbox-item input { cursor: pointer; accent-color: #5850EC; width: 15px; height: 15px; }

        /* 차트 캔버스 조절 */
        .chart-container { flex: 1; width: 100%; height: 100%; position: relative; }

        /* 크롬 달력 인풋 반전 */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>

    <script>
        let globalUsdToKrw = 1350;
        window.cachedGasData = null;

        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myLineChart = null; // 전역 차트 변수 명확히 정의
        let currentChartData = { labels: [], total: [], stock: [], bond: [], cash: [], gold: [] };
        let calculatedAssets = { total: 0, stock: 0, bond: 0, cash: 0, gold: 0 };

        async function initExchangeRate() {
            try {
                const rateRes = await fetch('https://open.er-api.com/v6/latest/USD');
                const rateJson = await rateRes.json();
                if(rateJson?.rates?.KRW) {
                    globalUsdToKrw = rateJson.rates.KRW;
                }
            } catch(e) {
                console.warn("환율 정보 조회 실패 기본값 사용:", e);
            }
        }

        async function preloadGoogleStockPrices() {
            const gasUrl = "https://script.google.com/macros/s/AKfycbwe2VssvmIlGMUrX0APMo8XYIWRWP0yTpTZw8KPYhtIoaj-ol8dtafnByZoB9ljtf0/exec";
            try {
                const response = await fetch(`${gasUrl}?t=${new Date().getTime()}`, { method: 'GET', mode: 'cors' });
                const data = await response.json();
                if (data && data.status === "success") {
                    window.cachedGasData = data.stockPrices;
                    console.log("✅ 실시간 시세 캐시 동기화 완료");
                }
            } catch (error) {
                console.error("❌ 실시간 시세 캐시 동기화 실패:", error);
            }
        }

        function normalizeAssetType(rawType) {
            if (!rawType) return '현금';
            const str = rawType.trim();
            if (str.includes('주식')) return '주식';
            if (str.includes('채권')) return '채권';
            if (str.includes('금') || str.includes('은')) return '금은';
            if (str.includes('현금') || str.includes('예금') || str.includes('적금')) return '현금';
            return '주식';
        }

        async function fetchDashboardData() {
            try {
                const [stockRes, depositRes] = await Promise.all([
                    _supabase.from('tb_realtime_stock_status').select('*'),
                    _supabase.from('deposit_management').select('*').eq('status', '유지')
                ]);

                if (stockRes.error) throw stockRes.error;
                if (depositRes.error) throw depositRes.error;

                let stockSum = 0;
                let bondSum = 0;
                let cashSum = 0;
                let goldSum = 0;

                if (stockRes.data && stockRes.data.length > 0) {
                    stockRes.data.forEach(item => {
                        const type = normalizeAssetType(item.asset_type);
                        const evalAmount = parseFloat(item.eval_amount || 0);

                        if (type === '주식') stockSum += evalAmount;
                        else if (type === '채권') bondSum += evalAmount;
                        else if (type === '금은') goldSum += evalAmount;
                        else if (type === '현금') cashSum += evalAmount;
                    });
                }

                if (depositRes.data && depositRes.data.length > 0) {
                    depositRes.data.forEach(item => {
                        const depositAmount = parseFloat(item.amount || 0);
                        cashSum += depositAmount;
                    });
                }

                calculatedAssets.stock = Math.max(0, Math.round(stockSum));
                calculatedAssets.bond = Math.max(0, Math.round(bondSum));
                calculatedAssets.cash = Math.max(0, Math.round(cashSum));
                calculatedAssets.gold = Math.max(0, Math.round(goldSum));
                calculatedAssets.total = calculatedAssets.stock + calculatedAssets.bond + calculatedAssets.cash + calculatedAssets.gold;

                renderSummaryUI();
                renderDynamicTreemap();

                // 마지막 데이터 업데이트 시간 갱신
                updateLastUpdatedTime();

            } catch (err) {
                console.error("❌ 대시보드 및 현금 데이터 로딩 실패:", err);
            }
        }

        function renderSummaryUI() {
            const assets = calculatedAssets;
            const total = assets.total || 1;

            document.getElementById('db-ratio-stock').innerText = ((assets.stock / total) * 100).toFixed(1) + '%';
            document.getElementById('db-ratio-bond').innerText = ((assets.bond / total) * 100).toFixed(1) + '%';
            document.getElementById('db-ratio-cash').innerText = ((assets.cash / total) * 100).toFixed(1) + '%';
            document.getElementById('db-ratio-gold').innerText = ((assets.gold / total) * 100).toFixed(1) + '%';

            document.getElementById('db-val-total').innerText = assets.total.toLocaleString() + ' 원';
            document.getElementById('db-val-stock').innerText = assets.stock.toLocaleString() + ' 원';
            document.getElementById('db-val-bond').innerText = assets.bond.toLocaleString() + ' 원';
            document.getElementById('db-val-cash').innerText = assets.cash.toLocaleString() + ' 원';
            document.getElementById('db-val-gold').innerText = assets.gold.toLocaleString() + ' 원';

            if(document.getElementById('gr-val-total')) {
                document.getElementById('gr-val-total').innerText = assets.total.toLocaleString() + ' 원';
                document.getElementById('gr-val-stock').innerText = assets.stock.toLocaleString() + ' 원';
                document.getElementById('gr-val-bond').innerText = assets.bond.toLocaleString() + ' 원';
                document.getElementById('gr-val-cash').innerText = assets.cash.toLocaleString() + ' 원';
                document.getElementById('gr-val-gold').innerText = assets.gold.toLocaleString() + ' 원';
                
                document.getElementById('gr-ratio-stock').innerText = ((assets.stock / total) * 100).toFixed(1) + '%';
                document.getElementById('gr-ratio-bond').innerText = ((assets.bond / total) * 100).toFixed(1) + '%';
                document.getElementById('gr-ratio-cash').innerText = ((assets.cash / total) * 100).toFixed(1) + '%';
                document.getElementById('gr-ratio-gold').innerText = ((assets.gold / total) * 100).toFixed(1) + '%';
            }
        }

        function renderDynamicTreemap() {
            const container = document.getElementById('treemap-container');
            if (!container) return;
            container.innerHTML = '';

            const width = container.clientWidth;
            const height = container.clientHeight;
            if (width === 0 || height === 0) return;

            const assets = calculatedAssets;
            const dataList = [
                { title: '주식', val: assets.stock, color: 'var(--color-stock)' },
                { title: '채권', val: assets.bond, color: 'var(--color-bond)' },
                { title: '현금', val: assets.cash, color: 'var(--color-cash)' },
                { title: '기타(금은)', val: assets.gold, color: 'var(--color-gold)' }
            ].filter(d => d.val > 0).sort((a, b) => b.val - a.val);

            const totalVal = dataList.reduce((sum, d) => sum + d.val, 0);
            if (totalVal === 0) {
                container.innerHTML = '<div style="color:#aaa; text-align:center; padding-top:100px; font-size:16px;">보유하거나 연동 가능한 자산 내역이 없습니다.</div>';
                return;
            }

            let remainingWidth = width;
            let remainingHeight = height;
            let currentX = 0;
            let currentY = 0;

            dataList.forEach((item, idx) => {
                const ratio = item.val / totalVal;
                const blockArea = width * height * ratio;

                const block = document.createElement('div');
                block.className = 'tm-block';
                block.style.backgroundColor = item.color;

                if (remainingWidth >= remainingHeight) {
                    let blockWidth = blockArea / remainingHeight;
                    if (idx === dataList.length - 1) blockWidth = remainingWidth; 
                    
                    block.style.left = currentX + 'px';
                    block.style.top = currentY + 'px';
                    block.style.width = blockWidth + 'px';
                    block.style.height = remainingHeight + 'px';

                    currentX += blockWidth;
                    remainingWidth -= blockWidth;
                } else {
                    let blockHeight = blockArea / remainingWidth;
                    if (idx === dataList.length - 1) blockHeight = remainingHeight;

                    block.style.left = currentX + 'px';
                    block.style.top = currentY + 'px';
                    block.style.width = remainingWidth + 'px';
                    block.style.height = blockHeight + 'px';

                    currentY += blockHeight;
                    remainingHeight -= blockHeight;
                }

                const percentText = (ratio * 100).toFixed(1) + '%';
                block.innerHTML = `
                    <div class="tm-title">${item.title}</div>
                    <div class="tm-ratio">${percentText}</div>
                    <div class="tm-val">${item.val.toLocaleString()} 원</div>
                `;
                container.appendChild(block);
            });
        }

        async function fetchGraphMonthlyData() {
            const selectedYear = document.getElementById('sel-year').value;
            const labels = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
            
            let totalMonthly = Array(12).fill(null);
            let stockMonthly = Array(12).fill(null);
            let bondMonthly = Array(12).fill(null);
            let cashMonthly = Array(12).fill(null);
            let goldMonthly = Array(12).fill(null);

            try {
                const { data: historyData, error } = await _supabase
                    .from('tb_monthly_snapshot')
                    .select('*')
                    .like('snapshot_month', `${selectedYear}-%`);

                if (error) throw error;

                if (historyData && historyData.length > 0) {
                    historyData.forEach(row => {
                        const [sYear, sMonth] = row.snapshot_month.split('-').map(Number);
                        let targetMonthIdx = sMonth - 1; 

                        if (targetMonthIdx >= 0 && targetMonthIdx < 12) {
                            totalMonthly[targetMonthIdx] = Math.round(parseFloat(row.total_sum || 0));
                            stockMonthly[targetMonthIdx] = Math.round(parseFloat(row.stock_sum || 0));
                            bondMonthly[targetMonthIdx] = Math.round(parseFloat(row.bond_sum || 0));
                            cashMonthly[targetMonthIdx] = Math.round(parseFloat(row.cash_sum || 0));
                            goldMonthly[targetMonthIdx] = Math.round(parseFloat(row.gold_sum || 0));
                        }
                    });
                }

            } catch (err) {
                console.error("❌ 월별 히스토리 데이터 조회 실패:", err);
            }

            currentChartData.labels = labels;
            currentChartData.total = totalMonthly;
            currentChartData.stock = stockMonthly;
            currentChartData.bond = bondMonthly;
            currentChartData.cash = cashMonthly;
            currentChartData.gold = goldMonthly;

            renderLineChart();

            // 마지막 데이터 업데이트 시간 갱신
            updateLastUpdatedTime();
        }

        function renderLineChart() {
            const ctx = document.getElementById('lineChart');
            if (!ctx) return;

            // 🛠️ 수정: window.myLineChart가 아닌 선언된 전역 변수 myLineChart를 검사하고 파괴하도록 통일
            if (myLineChart) {
                myLineChart.destroy();
            }

            const colors = {
                total: '#ff0000',
                stock: '#ff00bf',
                bond: '#00b050',
                cash: '#7030a0',
                gold: '#0070c0'
            };

            // 🛠️ 수정: 전역 변수 `myLineChart`에 직접 인스턴스 할당
            myLineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: currentChartData.labels,
                    datasets: [
                        {
                            label: '총자산',
                            data: currentChartData.total,
                            borderColor: colors.total,
                            backgroundColor: 'transparent',
                            borderWidth: 3,
                            pointBackgroundColor: colors.total,
                            pointBorderColor: colors.total,
                            pointRadius: 4,                 
                            tension: 0,
                            spanGaps: false,
                            hidden: !document.getElementById('chk-total').checked
                        },
                        {
                            label: '주식',
                            data: currentChartData.stock,
                            borderColor: colors.stock,
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointBackgroundColor: colors.stock,
                            pointBorderColor: colors.stock,
                            pointRadius: 3,
                            tension: 0,
                            spanGaps: false,
                            hidden: !document.getElementById('chk-stock').checked
                        },
                        {
                            label: '채권',
                            data: currentChartData.bond,
                            borderColor: colors.bond,
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointBackgroundColor: colors.bond,
                            pointBorderColor: colors.bond,
                            pointRadius: 3,
                            tension: 0,
                            spanGaps: false,
                            hidden: !document.getElementById('chk-bond').checked
                        },
                        {
                            label: '현금',
                            data: currentChartData.cash,
                            borderColor: colors.cash,
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointBackgroundColor: colors.cash,
                            pointBorderColor: colors.cash,
                            pointRadius: 3,
                            tension: 0,
                            spanGaps: false,
                            hidden: !document.getElementById('chk-cash').checked
                        },
                        {
                            label: '기타(금은)',
                            data: currentChartData.gold,
                            borderColor: colors.gold,
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            pointBackgroundColor: colors.gold,
                            pointBorderColor: colors.gold,
                            pointRadius: 3,
                            tension: 0,
                            spanGaps: false,
                            hidden: !document.getElementById('chk-gold').checked
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false 
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#1a1a1a', lineWidth: 1 },
                            ticks: { color: '#888888', font: { size: 12, family: 'Pretendard' } }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: '#1a1a1a', lineWidth: 1 },
                            ticks: {
                                color: '#888888',
                                font: { size: 12, family: 'Pretendard' },
                                callback: function(value) {
                                    return (value / 10000).toLocaleString() + ' 만원';
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateLineChart() {
            // 🛠️ 수정: 이제 전역 변수 myLineChart가 인스턴스를 정확히 가리키므로 예외 처리 통과
            if(!myLineChart) return;
            
            myLineChart.data.datasets[0].hidden = !document.getElementById('chk-total').checked;
            myLineChart.data.datasets[1].hidden = !document.getElementById('chk-stock').checked;
            myLineChart.data.datasets[2].hidden = !document.getElementById('chk-bond').checked;
            myLineChart.data.datasets[3].hidden = !document.getElementById('chk-cash').checked;
            myLineChart.data.datasets[4].hidden = !document.getElementById('chk-gold').checked;
            
            // 변경 사항을 반영해 차트 다시 그리기 실행
            myLineChart.update();
        }

        async function loadUserInfo() {
            if (!_supabase) return;
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                const userEmailEl = document.getElementById('user-email');
                if (userEmailEl) {
                    if (session && session.user) {
                        const email = session.user.email || "";
                        userEmailEl.innerText = email.split('@')[0];
                    } else {
                        userEmailEl.innerText = 'Guest';
                    }
                }
            } catch (e) {
                console.error("사용자 정보 가져오기 실패:", e);
                const userEmailEl = document.getElementById('user-email');
                if (userEmailEl) userEmailEl.innerText = 'Error';
            }
        }

        function switchDashboardView(viewMode) {
            const btnDb = document.getElementById('btn-dashboard');
            const btnGr = document.getElementById('btn-graph');
            const mainDb = document.getElementById('main-dashboard');
            const mainGr = document.getElementById('main-graph');

            if (viewMode === 'dashboard') {
                btnDb.className = "w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                btnGr.className = "w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                
                const iconDb = btnDb.querySelector('i, svg');
                const iconGr = btnGr.querySelector('i, svg');
                if (iconDb) iconDb.classList.add('text-[#5850EC]');
                if (iconGr) iconGr.classList.remove('text-[#5850EC]');

                mainDb.style.display = 'flex';
                mainGr.style.display = 'none';
                renderDynamicTreemap();
            } else {
                btnDb.className = "w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                btnGr.className = "w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";

                const iconDb = btnDb.querySelector('i, svg');
                const iconGr = btnGr.querySelector('i, svg');
                if (iconDb) iconDb.classList.remove('text-[#5850EC]');
                if (iconGr) iconGr.classList.add('text-[#5850EC]');

                mainDb.style.display = 'none';
                mainGr.style.display = 'flex';
                fetchGraphMonthlyData();
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // Lucide 아이콘 렌더링
            lucide.createIcons();

            // 로그인 사용자 정보 로딩
            await loadUserInfo();

            // 초기 대시보드 뷰 설정
            switchDashboardView('dashboard');

            try {
                await Promise.all([
                    initExchangeRate(),
                    preloadGoogleStockPrices(),
                    fetchDashboardData()
                ]);
            } catch (e) {
                console.error("초기 로딩 인터셉트 오류:", e);
                await fetchDashboardData();
            }

            // 마지막 데이터 업데이트 시간 표시
            updateLastUpdatedTime();
            
            window.addEventListener('resize', () => {
                clearTimeout(window.resizeTimer);
                window.resizeTimer = setTimeout(renderDynamicTreemap, 100);
            });
        });

        /**
         * 헤더의 마지막 데이터 업데이트 시간을 현재 시각으로 갱신하는 함수
         */
        function updateLastUpdatedTime() {
            const el = document.getElementById('last-updated-text');
            if (!el) return;
            const now = new Date();
            el.innerText = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
    </script>
</body>
