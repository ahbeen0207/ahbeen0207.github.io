<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식투자 자산관리 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #0E0E10;
        }
        .sidebar-bg {
            background-color: #141416;
            border-left: 1px solid #232329;
            border-right: 1px solid #232329;
        }
        /* 중앙 80% 인터페이스의 가장 우측 경계선 스타일 정의 */
        .content-frame {
            border-right: 1px solid #232329;
        }
        .card-bg {
            background-color: #18181C;
            border: 1px solid #232329;
        }
        .input-bg {
            background-color: #111114;
            border: 1px solid #232329;
        }
        
        /* 브라우저 메인 및 메인프레임 우측 전체 스크롤바 숨기기 기능 */
        .no-scrollbar::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* 데이터 테이블 내부 전용 가로 스크롤바 스타일 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #141416;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2D2D35;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3E3E4A;
        }

        /* 페이지네이션 스타일 커스텀 */
        .page-btn {
            background-color: #141416;
            border: 1px solid #232329;
            color: #A1A1AA;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            min-width: 32px;
            text-align: center;
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background-color: #232329;
            color: #ffffff;
            border-color: #5850EC;
        }
        .page-btn.active {
            background-color: #5850EC;
            color: white;
            border-color: #5850EC;
            font-weight: bold;
        }
        .page-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            background-color: #0E0E10;
        }

        /* 거래 내역 시장 구분 배지 스타일 */
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            display: inline-block;
        }
        .badge-kr {
            background-color: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #991b1b;
        }
        .badge-us {
            background-color: #1e3a8a;
            color: #93c5fd;
            border: 1px solid #1e40af;
        }
        .badge-krus {
            background-color: #3f1e8a;
            color: #c7d2fe;
            border: 1px solid #4338ca;
        }

        /* 크롬 달력 인풋 반전 */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="text-[#E4E4E7] text-sm antialiased flex h-screen overflow-hidden bg-[#0E0E10]">

    <!-- 좌측 10% 공백 유지 -->
    <div class="w-[10%] h-full bg-[#0E0E10] shrink-0"></div>

    <!-- 중앙 80% 영역 -->
    <div class="w-[80%] h-full flex shrink-0 content-frame">
        
        <!-- 좌측 사이드바: 너비 w-52, 내부 패딩 p-3 -->
        <aside class="w-52 sidebar-bg flex flex-col justify-between p-3 shrink-0 h-full">
            <div>
                <!-- 상단 로고: 마진 mb-5, black_rabbit 로고 100% 확대 -->
                <a href="select_page.html" class="flex items-center justify-center gap-2.5 mb-5 px-1 hover:opacity-85 transition">
                    <div class="bg-[#5850EC] p-1.5 rounded-xl text-white shadow-lg shadow-[#5850EC]/25 shrink-0 flex items-center justify-center">
                        <img src="black_rabbit.jpg" class="w-10 h-10 rounded-lg object-cover" onerror="this.src='rabbit.jpg'">
                    </div>
                    <span class="font-bold text-xl tracking-tight text-white">HOME</span>
                </a>
                
                <!-- 네비게이션: 주식관리 스위칭 탭 구성 (mt-20 적용) -->
                <nav class="space-y-0.5 mt-20">
                    <button id="btn-status" class="w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none" onclick="switchView('status')">
                        <i data-lucide="layout-grid" class="w-5 h-5 text-[#5850EC]"></i> 종목별현황
                    </button>
                    <button id="btn-trade" class="w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none" onclick="switchView('trade')">
                        <i data-lucide="history" class="w-5 h-5"></i> 거래내역
                    </button>
                </nav>
            </div>

            <!-- 하단 정보: Supabase 로그인 사용자 연동 (U아이콘 + 계정명) -->
            <div class="border-t border-[#232329] pt-2 flex items-center gap-2 px-1">
                <div class="w-8 h-8 rounded-full bg-[#5850EC]/20 border border-[#5850EC]/40 flex items-center justify-center text-[#A5A6F6] text-sm font-bold shrink-0">
                    U
                </div>
                <div class="min-w-0">
                    <p id="user-email" class="text-sm font-semibold text-white truncate">Loading...</p>
                </div>
            </div>
        </aside>

        <!-- 우측 메인 영역 -->
        <main class="flex-1 flex flex-col overflow-y-auto bg-[#0E0E10] h-full no-scrollbar">
            
            <!-- 상단 헤더: 6개 균등 분할 네비게이션 (세로 크기 h-20, 폰트 text-lg) -->
            <header class="h-20 border-b border-[#232329] px-2 flex items-center bg-[#0E0E10]/50 backdrop-blur-md sticky top-0 z-10 shrink-0">
                <div class="grid grid-cols-6 gap-1.5 w-full">
                    <a href="dashboard.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> 자산 현황
                    </a>
                    <a href="#" class="flex items-center justify-center gap-2 bg-[#232329] text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="trending-up" class="w-5 h-5 text-[#5850EC]"></i> 주식투자
                    </a>
                    <a href="stock_ipo.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="file-text" class="w-5 h-5"></i> 공모주투자
                    </a>
                    <a href="deposit.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="landmark" class="w-5 h-5"></i> 예적금
                    </a>
                    <a href="#" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition" onclick="location.reload(true); return false;">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i> 새로고침
                    </a>
                    <div class="flex items-center justify-center gap-2 text-slate-400 px-2 py-2.5 rounded-lg text-lg font-medium">
                        <i data-lucide="clock" class="w-5 h-5"></i> <span id="last-updated-text">-</span>
                    </div>
                </div>
            </header>

            <!-- 메인 콘텐츠 영역: 패딩 p-4, 내부 간격 space-y-3 제거 -->
            <div class="p-4 w-full flex-1 flex flex-col">
                
                <!-- 1. 종목별 현황 뷰 -->
                <div id="main-status" class="space-y-3 w-full flex-1 flex flex-col">
                    
                    <!-- 투자 요약 정보 및 필터 카드: 세로 크기 50% 확대 (py-5 px-3) -->
                    <div id="status-filter-box" class="card-bg py-5 px-3 rounded-lg shadow-xl flex flex-wrap items-center gap-3 text-sm shrink-0">
                        <!-- 금액 현황판 -->
                        <div class="flex items-center gap-1.5 mr-1">
                            <input type="text" id="status-total-invest" class="text-center font-extrabold text-emerald-400 bg-[#111114] border border-[#232329] rounded-lg px-3 py-2 text-sm w-36 focus:outline-none cursor-default" readonly value="0원">
                            <input type="text" id="status-total-profit" class="text-center font-extrabold bg-[#111114] border border-[#232329] rounded-lg px-3 py-2 text-sm w-56 focus:outline-none cursor-default" readonly value="0원 (0%)">
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">시장구분</label>
                            <select id="status-filter-market" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="KR">KR</option>
                                <option value="US">US</option>
                                <option value="KRUS">KRUS</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">증권사</label>
                            <select id="status-filter-brokerage" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="미래에셋">미래에셋</option>
                                <option value="NH투자증권">NH투자증권</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">계좌</label>
                            <select id="status-filter-account" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="연금저축계좌">연금저축계좌</option>
                                <option value="주식계좌">주식계좌</option>
                                <option value="ISA">ISA</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">자산분류</label>
                            <select id="status-filter-asset" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="주식" selected>주식</option>
                                <option value="채권">채권</option>
                                <option value="금은">금은</option>
                            </select>
                        </div>

                        <div class="flex-1 min-w-[120px] flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">종목명</label>
                            <input type="text" id="status-filter-name" placeholder="종목명 입력..." class="w-full text-xs input-bg rounded-md px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-[#5850EC]">
                        </div>

                        <button class="bg-[#5850EC] hover:bg-[#4B43D3] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="renderStatusTable()">
                            <i data-lucide="search" class="w-3.5 h-3.5"></i> 검색
                        </button>
                    </div>

                    <!-- 종목별 보유현황 데이터 리스트 카드 -->
                    <div class="card-bg p-4 rounded-xl shadow-xl flex flex-col overflow-hidden flex-1">
                        <div class="overflow-x-auto custom-scrollbar text-sm flex-1">
                            <table id="status-table" class="w-full text-left border-collapse whitespace-nowrap">
                                <thead class="bg-[#141416] text-slate-400 uppercase font-medium border-b border-[#232329]">
                                    <tr>
                                        <th class="p-2.5">시장구분</th>
                                        <th class="p-2.5">자산분류</th>
                                        <th class="p-2.5 text-left">종목명</th>
                                        <th class="p-2.5">종목코드</th>
                                        <th class="p-2.5 text-right">잔고(보유수량)</th>
                                        <th class="p-2.5 text-right">원화평단</th>
                                        <th class="p-2.5 text-right">현재주가</th>
                                        <th class="p-2.5 text-right">원화매입가</th>
                                        <th class="p-2.5 text-right">원화현재가</th>
                                        <th class="p-2.5 text-right">자산비중</th>
                                        <th class="p-2.5 text-right pr-10">투자수익</th>
                                        <th class="p-2.5 text-right pr-10">투자수익률</th>
                                    </tr>
                                </thead>
                                <tbody id="status-table-body" class="divide-y divide-[#232329] text-slate-300">
                                    <tr><td colspan="12" class="p-4 text-center">종목별 현황 데이터를 불러오는 중입니다.</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 2. 거래내역 뷰 -->
                <div id="main-trade" class="space-y-3 w-full flex-1 flex flex-col" style="display: none;">
                    
                    <!-- 거래내역 필터 카드: 세로 크기 50% 확대 (py-5 px-3) -->
                    <div id="filter-box" class="card-bg py-5 px-3 rounded-lg shadow-xl flex flex-wrap items-center gap-3 text-sm shrink-0">
                        <div class="flex items-center gap-1">
                            <input type="month" id="filter-date" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC] w-36">
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">시장구분</label>
                            <select id="filter-market" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="KR">KR</option>
                                <option value="US">US</option>
                                <option value="KRUS">KRUS</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">증권사</label>
                            <select id="filter-brokerage" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="미래에셋">미래에셋</option>
                                <option value="NH투자증권">NH투자증권</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">계좌분류</label>
                            <select id="filter-account" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="연금저축계좌">연금저축계좌</option>
                                <option value="주식계좌">주식계좌</option>
                                <option value="ISA">ISA</option>
                            </select>
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">자산분류</label>
                            <select id="filter-asset" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="주식">주식</option>
                                <option value="채권">채권</option>
                                <option value="금은">금은</option>
                            </select>
                        </div>

                        <div class="flex-1 min-w-[120px] flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">종목명</label>
                            <input type="text" id="filter-name" placeholder="종목명 입력..." class="w-full text-xs input-bg rounded-md px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-[#5850EC]">
                        </div>

                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">구분</label>
                            <select id="filter-side" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="매수">매수</option>
                                <option value="매도">매도</option>
                            </select>
                        </div>

                        <div class="flex gap-2">
                            <button class="bg-[#5850EC] hover:bg-[#4B43D3] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="fetchTradeHistory(1)">
                                <i data-lucide="search" class="w-3.5 h-3.5"></i> 검색
                            </button>
                            <button class="bg-[#10B981] hover:bg-[#059669] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="openRegisterModal()">
                                <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> 등록
                            </button>
                        </div>
                    </div>

                    <!-- 거래내역 데이터 리스트 카드 -->
                    <div class="card-bg p-4 rounded-xl shadow-xl flex flex-col overflow-hidden flex-1">
                        <!-- 게시판 타이틀 영역 삭제됨 -->
                        
                        <div class="overflow-x-auto custom-scrollbar text-sm flex-1">
                            <table id="data-table" class="w-full text-left border-collapse whitespace-nowrap">
                                <thead class="bg-[#141416] text-slate-400 uppercase font-medium border-b border-[#232329]">
                                    <tr>
                                        <th class="p-2.5">거래일자</th>
                                        <th class="p-2.5">시장</th>
                                        <th class="p-2.5">증권사</th>
                                        <th class="p-2.5">계좌</th>
                                        <th class="p-2.5">자산</th>
                                        <th class="p-2.5 text-left">종목명</th>
                                        <th class="p-2.5">코드</th>
                                        <th class="p-2.5">구분</th>
                                        <th class="p-2.5 text-right">수량</th>
                                        <th class="p-2.5 text-right">원화단가</th>
                                        <th class="p-2.5 text-right">금액</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body" class="divide-y divide-[#232329] text-slate-300">
                                </tbody>
                            </table>
                        </div>

                        <!-- 페이지네이션 -->
                        <div id="pagination" class="flex justify-center items-center gap-1 mt-4 pt-3 border-t border-[#232329] user-select-none">
                        </div>
                    </div>
                </div>               
            </div>
        </main>
    </div>

    <!-- 우측 10% 공백 유지 -->
    <div class="w-[10%] h-full bg-[#0E0E10] shrink-0"></div>

    <!-- 등록/수정 모달 (디자인 시스템 테마 통합 개편) -->
    <div id="register-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div id="draggable-modal" class="card-bg w-full max-w-4xl rounded-2xl border border-[#232329] shadow-2xl overflow-hidden">
            <!-- 모달 헤더 (드래그 지원) -->
            <div class="bg-[#141416] border-b border-[#232329] px-6 py-4 flex items-center justify-between cursor-move" id="modal-header-drag">
                <h2 class="text-[#A5A6F6] text-base font-bold">거래내역 등록</h2>
                <button class="text-slate-400 hover:text-white text-2xl font-semibold focus:outline-none" onclick="closeModal()">&times;</button>

    <script>
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l'; 
        
        let _supabase;
        try { 
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 
        } catch(e) { 
            console.error("Supabase 초기화 실패:", e); 
        }

        let currentPage = 1;
        const itemsPerPage = 15;
        let globalUsdToKrw = 1350; 
        let globalActiveStocks = [];

        async function initExchangeRate() {
            try {
                const rateRes = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(3000) });
                const rateJson = await rateRes.json();
                if(rateJson?.rates?.KRW) globalUsdToKrw = rateJson.rates.KRW;
            } catch(e) { console.warn("환율 조회 실패 (기본 환율 1350원 유지):", e); }
        }

        async function fetchStatusDashboard() {
            const statusBody = document.getElementById('status-table-body');
            statusBody.innerHTML = '<tr><td colspan="11" class="p-4 text-center">보유 자산 데이터를 산출하는 중입니다...</td></tr>';
            if (!_supabase) return;

            try {
                const [tradesRes, realtimeRes] = await Promise.all([
                    _supabase.from('tb_stock_trade').select('*'),
                    _supabase.from('tb_realtime_stock_status').select('stock_code, live_price, updated_at')
                ]);

                if (tradesRes.error) throw tradesRes.error;
                if (realtimeRes.error) throw realtimeRes.error;

                const safeTrades = tradesRes.data || [];
                const realtimePrices = realtimeRes.data || [];

                let latestUpdateIso = null;
                const priceMap = {};
                
                realtimePrices.forEach(item => {
                    if (item.stock_code) priceMap[item.stock_code] = parseFloat(item.live_price) || 0;
                    if (item.updated_at && (!latestUpdateIso || item.updated_at > latestUpdateIso)) latestUpdateIso = item.updated_at;
                });

                // 상단 헤더 내의 업데이트 시간 영역 세팅
                const txtLastUpdated = document.getElementById('last-updated-text');
                if (txtLastUpdated) {
                    if (latestUpdateIso) {
                        const d = new Date(latestUpdateIso);
                        const pad = (n) => n < 10 ? '0' + n : n;
                        txtLastUpdated.innerText = `${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                    } else { txtLastUpdated.innerText = "-"; }
                }

                const stockMap = {};
                safeTrades.forEach(trade => {
                    const tickerKey = trade.stock_code || trade.stock_name;
                    const key = `${tickerKey}_${trade.brokerage_name}_${trade.account_type}`;
                    
                    if (!stockMap[key]) {
                        stockMap[key] = {
                            market_type: trade.market_type, brokerage_name: trade.brokerage_name, account_type: trade.account_type,     
                            asset_type: trade.asset_type, stock_name: trade.stock_name, stock_code: trade.stock_code, balance: 0, total_cost: 0, avg_price: 0   
                        };
                    }

                    const s = stockMap[key];
                    const qty = parseFloat(trade.quantity) || 0;
                    const amt = parseFloat(trade.amount_krw) || 0;

                    if (trade.trade_side === '매수') { s.balance += qty; s.total_cost += amt; } 
                    else if (trade.trade_side === '매도') {
                        if (s.balance > 0) {
                            const currentAvg = s.total_cost / s.balance;
                            s.balance -= qty; s.total_cost = s.balance * currentAvg; 
                        } else { s.balance -= qty; s.total_cost -= amt; }
                    }
                });

                let processedStocks = Object.values(stockMap).map(s => {
                    s.avg_price = s.balance > 0 ? (s.total_cost / s.balance) : 0;
                    return s;
                }).filter(s => s.balance !== 0);

                processedStocks.forEach(stock => {
                    let livePriceKrw = priceMap[stock.stock_code] || stock.avg_price; 
                    stock.live_price_krw = livePriceKrw;     
                    stock.live_current_krw = stock.balance * livePriceKrw;   
                    stock.live_profit = stock.live_current_krw - stock.total_cost;       
                    stock.live_rate = stock.total_cost > 0 ? (stock.live_profit / stock.total_cost) * 100 : 0;           
                });

                globalActiveStocks = processedStocks;
                globalActiveStocks.sort((a, b) => (b.live_current_krw || 0) - (a.live_current_krw || 0));
                renderStatusTable();

            } catch (error) {
                console.error('현황 데이터 로드 에러:', error);
                statusBody.innerHTML = `<tr><td colspan="12" class="p-4 text-center text-rose-500">데이터 로드 실패: ${error.message}</td></tr>`;
            }
        }

        function renderStatusTable() {
            const statusBody = document.getElementById('status-table-body');
            const fMarket = document.getElementById('status-filter-market')?.value || "";
            const fBrokerage = document.getElementById('status-filter-brokerage')?.value || "";
            const fAccount = document.getElementById('status-filter-account')?.value || "";
            const fAsset = document.getElementById('status-filter-asset')?.value || "";
            const fName = document.getElementById('status-filter-name')?.value.trim().toLowerCase() || "";

            const filtered = globalActiveStocks.filter(s => {
                if (fMarket && s.market_type !== fMarket) return false;
                if (fBrokerage && s.brokerage_name !== fBrokerage) return false; 
                if (fAccount && s.account_type !== fAccount) return false;     
                if (fAsset && s.asset_type !== fAsset) return false;
                if (fName && !s.stock_name.toLowerCase().includes(fName)) return false;
                return true;
            });

            if (!filtered || filtered.length === 0) {
                statusBody.innerHTML = '<tr><td colspan="12" class="p-4 text-center">조건에 맞는 보유 자산 내역이 없습니다.</td></tr>';
                if (document.getElementById('status-total-invest')) document.getElementById('status-total-invest').value = "0원";
                if (document.getElementById('status-total-profit')) document.getElementById('status-total-profit').value = "0원 (0%)";
                return;
            }

            // 필터링된 전체 자산의 평가금액(원화현재가) 총합 구하기
            let sumCurrentKrw = 0;
            filtered.forEach(s => {
                const liveCurrent = s.live_current_krw || (s.balance * s.avg_price);
                sumCurrentKrw += liveCurrent;
            });

            let html = '';
            filtered.forEach((s, idx) => {
                const livePrice = s.live_price_krw || s.avg_price;
                const liveCurrent = s.live_current_krw || (s.balance * s.avg_price);
                const liveProfit = s.live_profit || 0;
                const liveRate = s.live_rate || 0;

                // 자산비중 계산
                const ratio = sumCurrentKrw > 0 ? (liveCurrent / sumCurrentKrw) * 100 : 0;
                const ratioText = `${ratio.toFixed(1)}%`;

                let profitStyle = ''; let profitSign = '';
                if (liveProfit > 0) { profitStyle = 'color: #f87171;'; profitSign = '+'; } 
                else if (liveProfit < 0) { profitStyle = 'color: #60a5fa;'; }

                let badgeClass = 'badge-kr';
                if (s.market_type === 'US') badgeClass = 'badge-us';
                else if (s.market_type === 'KRUS') badgeClass = 'badge-krus';

                html += `
                    <tr>
                        <td class="p-2.5"><span class="badge ${badgeClass}">${s.market_type}</span></td>
                        <td class="p-2.5">${s.asset_type || '주식'}</td>
                        <td class="p-2.5 font-semibold text-white text-left max-w-[200px] truncate">${s.stock_name}</td>
                        <td class="p-2.5 text-slate-400">${s.stock_code || '-'}</td>
                        <td class="p-2.5 text-right font-medium">${Math.round(s.balance).toLocaleString()}</td>
                        <td class="p-2.5 text-right">${Math.round(s.avg_price).toLocaleString()}원</td>
                        <td class="p-2.5 text-right text-white">${Math.round(livePrice).toLocaleString()}원</td>
                        <td class="p-2.5 text-right">${Math.round(s.total_cost).toLocaleString()}원</td>
                        <td class="p-2.5 text-right text-white">${Math.round(liveCurrent).toLocaleString()}원</td>
                        <td class="p-2.5 text-right font-semibold text-slate-300">${ratioText}</td>
                        <td class="p-2.5 text-right font-semibold" style="${profitStyle}">${profitSign}${Math.round(liveProfit).toLocaleString()}원</td>
                        <td class="p-2.5 text-right font-semibold" style="${profitStyle}">${profitSign}${liveRate.toFixed(1)}%</td>
                    </tr>
                `;
            });
            statusBody.innerHTML = html;

            let totalCostSum = 0; let totalCurrentSum = 0;    
            filtered.forEach(s => {
                totalCostSum += (parseFloat(s.total_cost) || 0);
                totalCurrentSum += (parseFloat(s.live_current_krw) || 0);
            });

            let totalProfitSum = totalCurrentSum - totalCostSum; 
            let profitRate = totalCostSum > 0 ? (totalProfitSum / totalCostSum) * 100 : 0; 

            const txtInvest = document.getElementById('status-total-invest');
            const txtProfit = document.getElementById('status-total-profit');

            if (txtInvest) txtInvest.value = Math.round(totalCurrentSum).toLocaleString() + "원";
            if (txtProfit) {
                const sign = totalProfitSum > 0 ? "+" : "";
                txtProfit.value = `${sign}${Math.round(totalProfitSum).toLocaleString()}원 (${sign}${profitRate.toFixed(1)}%)`; 
                if (totalProfitSum > 0) txtProfit.style.color = "#f87171"; 
                else if (totalProfitSum < 0) txtProfit.style.color = "#60a5fa"; 
                else txtProfit.style.color = "#E4E4E7";
            }
        }

        async function fetchTradeHistory(page = 1) {
            if(!_supabase) return;
            currentPage = page;
            const body = document.getElementById('table-body');
            body.innerHTML = '<tr><td colspan="11" class="p-4 text-center">조회 중...</td></tr>';

            const fMonth = document.getElementById('filter-date').value;
            const fMarket = document.getElementById('filter-market').value;
            const fBrokerage = document.getElementById('filter-brokerage').value;
            const fAccount = document.getElementById('filter-account').value;
            const fName = document.getElementById('filter-name').value;
            const fSide = document.getElementById('filter-side').value;
            const fAsset = document.getElementById('filter-asset').value;

            let query = _supabase.from('tb_stock_trade').select('*', { count: 'exact' });

            if (fMonth && fMonth.trim() !== "") {
                const parts = fMonth.split('-');
                const startDate = `${fMonth}-01`;
                const lastDay = new Date(parseInt(parts[0]), parseInt(parts[1]), 0).getDate();
                const endDate = `${fMonth}-${lastDay < 10 ? '0' + lastDay : lastDay}`;
                query = query.gte('trade_date', startDate).lte('trade_date', endDate);
            }
            
            if (fMarket) query = query.eq('market_type', fMarket);
            if (fBrokerage) query = query.eq('brokerage_name', fBrokerage);
            if (fAccount) query = query.eq('account_type', fAccount);
            if (fAsset) query = query.eq('asset_type', fAsset);
            if (fName) query = query.ilike('stock_name', `%${fName}%`);
            if (fSide) query = query.eq('trade_side', fSide);

            const from = (currentPage - 1) * itemsPerPage;
            const to = from + itemsPerPage - 1;

            const { data, error, count } = await query.order('trade_date', { ascending: false }).range(from, to);
            if (error) {
                body.innerHTML = `<tr><td colspan="11" class="p-4 text-center text-rose-500">에러: ${error.message}</td></tr>`;
                renderPagination(0); return;
            }
            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="11" class="p-4 text-center">내역이 없습니다.</td></tr>';
                renderPagination(0); return;
            }

            body.innerHTML = data.map(item => {
                const itemStr = encodeURIComponent(JSON.stringify(item));
                return `
                    <tr>
                        <td class="p-2.5">${item.trade_date}</td>
                        <td class="p-2.5">${item.market_type}</td>
                        <td class="p-2.5">${item.brokerage_name}</td>
                        <td class="p-2.5">${item.account_type}</td>
                        <td class="p-2.5">${item.asset_type}</td>
                        <td class="p-2.5 text-left text-white font-medium max-w-[200px] truncate">
                            <span class="cursor-pointer underline hover:text-[#5850EC]" onclick="openEditModal('${itemStr}')">${item.stock_name}</span>
                        </td>
                        <td class="p-2.5 text-slate-400">${item.stock_code || '-'}</td>
                        <td class="p-2.5 font-bold ${item.trade_side === '매수' ? 'text-rose-400' : 'text-blue-400'}">${item.trade_side}</td>
                        <td class="p-2.5 text-right">${Number(item.quantity).toLocaleString()}</td>
                        <td class="p-2.5 text-right">${Number(item.price_krw).toLocaleString()}원</td>
                        <td class="p-2.5 text-right font-semibold text-white">${Number(item.amount_krw).toLocaleString()}원</td>
                    </tr>`;
            }).join('');
            renderPagination(count);
        }

        function renderPagination(totalCount) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.max(1, Math.ceil(totalCount / itemsPerPage));
            let html = ''; const maxButtons = 5; 
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) startPage = Math.max(1, endPage - maxButtons + 1);

            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchTradeHistory(1)">«</button>`;
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchTradeHistory(${Math.max(1, currentPage - 1)})">‹</button>`;
            for (let i = startPage; i <= endPage; i++) {
                if (i > 0) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="fetchTradeHistory(${i})">${i}</button>`;
            }
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchTradeHistory(${Math.min(totalPages, currentPage + 1)})">›</button>`;
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchTradeHistory(${totalPages})">»</button>`;
            pagination.innerHTML = html;
        }

        function resetFilters() {
            const filterDate = document.getElementById('filter-date');
            if (filterDate) filterDate.value = "";
            ['filter-market', 'filter-brokerage', 'filter-account', 'filter-asset', 'filter-name', 'filter-side'].forEach(id => {
                const el = document.getElementById(id); if(el) el.value = "";
            });
            ['status-filter-market', 'status-filter-brokerage', 'status-filter-account', 'status-filter-name'].forEach(id => {
                const el = document.getElementById(id); if(el) el.value = "";
            });
            const statusAsset = document.getElementById('status-filter-asset');
            if (statusAsset) statusAsset.value = "주식";
        }
	
        function switchView(view) {
            resetFilters();
            
            const btnStatus = document.getElementById('btn-status');
            const btnTrade = document.getElementById('btn-trade');
            const mainStatus = document.getElementById('main-status');
            const mainTrade = document.getElementById('main-trade');

            if (view === 'trade') {
                btnStatus.className = "w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                btnTrade.className = "w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                
                // 아이콘 색상 교체
                const iconStatus = btnStatus.querySelector('i, svg');
                const iconTrade = btnTrade.querySelector('i, svg');
                if (iconStatus) iconStatus.classList.remove('text-[#5850EC]');
                if (iconTrade) iconTrade.classList.add('text-[#5850EC]');

                mainStatus.style.display = 'none'; 
                mainTrade.style.display = 'flex'; 
                fetchTradeHistory(1); 
            } else {
                btnStatus.className = "w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                btnTrade.className = "w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                
                const iconStatus = btnStatus.querySelector('i, svg');
                const iconTrade = btnTrade.querySelector('i, svg');
                if (iconStatus) iconStatus.classList.add('text-[#5850EC]');
                if (iconTrade) iconTrade.classList.remove('text-[#5850EC]');

                mainStatus.style.display = 'flex'; 
                mainTrade.style.display = 'none'; 
                fetchStatusDashboard();
            }
        }

        function openRegisterModal() {
            const modalOverlay = document.getElementById('register-modal');
            const modalContent = document.getElementById('draggable-modal');
            
            if (modalOverlay && modalContent) {
                modalOverlay.classList.remove('hidden');
                // 드래그 위치 초기화
                modalContent.style.transform = 'none';
                modalContent.style.left = 'auto';
                modalContent.style.top = 'auto';
            }
        }

        function openEditModal(itemStr) {
            const item = JSON.parse(decodeURIComponent(itemStr));
            openRegisterModal();
            document.querySelector('#draggable-modal h2').innerText = '거래내역 수정';
            document.getElementById('btn-submit-modal').innerText = '수정 완료';
            const form = document.getElementById('register-form');
            
            document.getElementById('modal_trade_id').value = item.id; 
            form.elements['trade_date'].value = item.trade_date;
            form.elements['market_type'].value = item.market_type;
            form.elements['brokerage_name'].value = item.brokerage_name;
            form.elements['account_type'].value = item.account_type;
            form.elements['asset_type'].value = item.asset_type;
            form.elements['stock_name'].value = item.stock_name;
            form.elements['stock_code'].value = item.stock_code || '';
            form.elements['trade_side'].value = item.trade_side;
            
            document.getElementById('modal_quantity').value = item.quantity || '';
            document.getElementById('modal_price_krw').value = item.price_krw || '';
            document.getElementById('modal_amount_krw').value = item.amount_krw || '';
            document.getElementById('modal_price_usd').value = item.price_usd || '';
            document.getElementById('modal_amount_usd').value = item.amount_usd || '';
            document.getElementById('modal_exchange_rate').value = item.exchange_rate || '';
            form.elements['fee_tax'].value = item.fee_tax || '';
            form.elements['remarks'].value = item.remarks || '';
        }
        
        function calculateAmounts() {
            const qty = parseFloat(document.getElementById('modal_quantity').value) || 0;
            const pKrw = parseFloat(document.getElementById('modal_price_krw').value) || 0;
            const pUsd = parseFloat(document.getElementById('modal_price_usd').value) || 0;
            document.getElementById('modal_amount_krw').value = Math.round(qty * pKrw);
            document.getElementById('modal_amount_usd').value = (qty * pUsd).toFixed(2);
        }

        async function saveTradeHistory(event) {
            if (event) event.preventDefault(); if(!_supabase) return;
            const form = document.getElementById('register-form');
            const data = Object.fromEntries(new FormData(form).entries());
            data.institution_type = "증권"; 
			
            if(!data.price_usd) data.price_usd = null;
            if(!data.amount_usd) data.amount_usd = null;
            if(!data.exchange_rate) data.exchange_rate = null;
            if(!data.fee_tax) data.fee_tax = null;
			
            const tradeId = document.getElementById('modal_trade_id').value;
            if (!tradeId) delete data.id; 

            try {
                if (tradeId) {
                    const { error } = await _supabase.from('tb_stock_trade').update(data).eq('id', tradeId);
                    if (error) throw error; alert('수정되었습니다.');
                } else {
                    const { error } = await _supabase.from('tb_stock_trade').insert([data]);
                    if (error) throw error; alert('저장되었습니다.');
                }
                closeModal(); fetchTradeHistory(currentPage); 
            } catch (err) { alert('처리 중 에러가 발생했습니다: ' + err.message); }
        }

        function closeModal() { 
            document.getElementById('register-modal').classList.add('hidden'); 
            document.querySelector('#draggable-modal h2').innerText = '거래내역 등록';
            document.getElementById('btn-submit-modal').innerText = '저장';
            document.getElementById('modal_trade_id').value = '';
            document.getElementById('register-form').reset();
        }
		
        function makeModalDraggable(modalEl, headerEl) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (headerEl) headerEl.onmousedown = dragMouseDown;
            else modalEl.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                if (['INPUT', 'SELECT', 'BUTTON', 'TEXTAREA'].includes(e.target.tagName)) return;
                e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = closeDragElement; document.onmousemove = elementDrag;
            }
            function elementDrag(e) {
                e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY;
                modalEl.style.transform = 'none'; 
                modalEl.style.top = (modalEl.offsetTop - pos2) + "px"; modalEl.style.left = (modalEl.offsetLeft - pos1) + "px";
            }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
        }

        async function loadUserInfo() {
            if (!_supabase) return;
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                const userEmailEl = document.getElementById('user-email');
                if (userEmailEl) {
                    if (session && session.user) {
                        const email = session.user.email || "";
                        userEmailEl.innerText = email.split('@')[0];
                    } else {
                        userEmailEl.innerText = 'Guest';
                    }
                }
            } catch (e) {
                console.error("사용자 정보 가져오기 실패:", e);
                const userEmailEl = document.getElementById('user-email');
                if (userEmailEl) userEmailEl.innerText = 'Error';
            }
        }

        window.onload = async () => {
            // Lucide 아이콘 렌더링
            lucide.createIcons();

            // 환율 동기화는 화면 렌더링을 막지 않고 백그라운드로 실행
            initExchangeRate().catch(e => console.warn("환율 동기화 초기화 오류:", e));
            
            // 로그인 세션 확인 및 계정명 바인딩
            await loadUserInfo();
            
            // 첫 화면인 보유현황 렌더링
            switchView('status'); 
            
            const modal = document.getElementById('draggable-modal');
            const header = document.getElementById('modal-header-drag');
            if (modal && header) makeModalDraggable(modal, header);
        };
    </script>
