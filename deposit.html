<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식관리 시스템 - 예적금</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #0E0E10;
        }
        .sidebar-bg {
            background-color: #141416;
            border-left: 1px solid #232329;
            border-right: 1px solid #232329;
        }
        /* 중앙 80% 인터페이스의 가장 우측 경계선 스타일 정의 */
        .content-frame {
            border-right: 1px solid #232329;
        }
        .card-bg {
            background-color: #18181C;
            border: 1px solid #232329;
        }
        .input-bg {
            background-color: #111114;
            border: 1px solid #232329;
        }
        
        /* 브라우저 메인 및 메인프레임 우측 전체 스크롤바 숨기기 기능 */
        .no-scrollbar::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* 데이터 테이블 내부 전용 가로 스크롤바 스타일 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #141416;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2D2D35;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3E3E4A;
        }

        /* 페이지네이션 스타일 커스텀 */
        .page-btn {
            background-color: #141416;
            border: 1px solid #232329;
            color: #A1A1AA;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            min-width: 32px;
            text-align: center;
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background-color: #232329;
            color: #ffffff;
            border-color: #5850EC;
        }
        .page-btn.active {
            background-color: #5850EC;
            color: white;
            border-color: #5850EC;
            font-weight: bold;
        }
        .page-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            background-color: #0E0E10;
        }

        /* 크롬 달력 인풋 반전 */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body class="text-[#E4E4E7] text-sm antialiased flex h-screen overflow-hidden bg-[#0E0E10]">

    <!-- 좌측 10% 공백 유지 -->
    <div class="w-[10%] h-full bg-[#0E0E10] shrink-0"></div>

    <!-- 중앙 80% 영역 -->
    <div class="w-[80%] h-full flex shrink-0 content-frame">
        
        <!-- 좌측 사이드바: 너비 w-52, 내부 패딩 p-3 -->
        <aside class="w-52 sidebar-bg flex flex-col justify-between p-3 shrink-0 h-full">
            <div>
                <!-- 상단 로고: 마진 mb-5, black_rabbit 로고 100% 확대 -->
                <a href="select_page.html" class="flex items-center justify-center gap-2.5 mb-5 px-1 hover:opacity-85 transition">
                    <div class="bg-[#5850EC] p-1.5 rounded-xl text-white shadow-lg shadow-[#5850EC]/25 shrink-0 flex items-center justify-center">
                        <img src="black_rabbit.jpg" class="w-10 h-10 rounded-lg object-cover" onerror="this.src='rabbit.jpg'">
                    </div>
                    <span class="font-bold text-xl tracking-tight text-white">HOME</span>
                </a>
                
                <!-- 네비게이션: 주식관리 스위칭 탭 구성 (mt-20 적용) -->
                <nav class="space-y-0.5 mt-20">
                    <button id="btn-status" class="w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none" onclick="switchView('status')">
                        <i data-lucide="layout-grid" class="w-5 h-5 text-[#5850EC]"></i> 종목별현황
                    </button>
                    <button id="btn-trade" class="w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none" onclick="switchView('trade')">
                        <i data-lucide="history" class="w-5 h-5"></i> 거래내역
                    </button>
                </nav>
            </div>

            <!-- 하단 정보: Supabase 로그인 사용자 연동 (U아이콘 + 계정명) -->
            <div class="border-t border-[#232329] pt-2 flex items-center gap-2 px-1">
                <div class="w-8 h-8 rounded-full bg-[#5850EC]/20 border border-[#5850EC]/40 flex items-center justify-center text-[#A5A6F6] text-sm font-bold shrink-0">
                    U
                </div>
                <div class="min-w-0">
                    <p id="user-email" class="text-sm font-semibold text-white truncate">Loading...</p>
                </div>
            </div>
        </aside>

        <!-- 우측 메인 영역 -->
        <main class="flex-1 flex flex-col overflow-y-auto bg-[#0E0E10] h-full no-scrollbar">
            
            <!-- 상단 헤더: 6개 균등 분할 네비게이션 (세로 크기 h-20, 폰트 text-lg) -->
            <header class="h-20 border-b border-[#232329] px-2 flex items-center bg-[#0E0E10]/50 backdrop-blur-md sticky top-0 z-10 shrink-0">
                <div class="grid grid-cols-6 gap-1.5 w-full">
                    <a href="dashboard.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> 자산 현황
                    </a>
                    <a href="stock.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="trending-up" class="w-5 h-5"></i> 주식투자
                    </a>
                    <a href="stock_ipo.html" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="file-text" class="w-5 h-5"></i> 공모주투자
                    </a>
                    <a href="#" class="flex items-center justify-center gap-2 bg-[#232329] text-white px-2 py-2.5 rounded-lg text-lg font-medium transition">
                        <i data-lucide="landmark" class="w-5 h-5 text-[#5850EC]"></i> 예적금
                    </a>
                    <a href="#" class="flex items-center justify-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-2 py-2.5 rounded-lg text-lg font-medium transition" onclick="location.reload(true); return false;">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i> 새로고침
                    </a>
                    <div class="flex items-center justify-center gap-2 text-slate-400 px-2 py-2.5 rounded-lg text-lg font-medium">
                        <i data-lucide="clock" class="w-5 h-5"></i> <span id="last-updated-text">-</span>
                    </div>
                </div>
            </header>

            <!-- 메인 콘텐츠 영역: 패딩 p-4, 내부 간격 space-y-3 제거 -->
            <div class="p-4 w-full flex-1 flex flex-col">
                
                <!-- 1. 종목별 현황 뷰 -->
                <div id="main-status" class="space-y-3 w-full flex-1 flex flex-col">
                    
                    <!-- 필터 카드 -->
                    <div class="card-bg py-5 px-3 rounded-lg shadow-xl flex flex-wrap items-center gap-3 text-sm shrink-0">
                        <div class="flex items-center gap-1">
                            <input type="month" id="filter-status-date" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC] w-36">
                        </div>
                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">기관분류</label>
                            <select id="filter-status-inst-category" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="은행">은행</option>
                                <option value="증권">증권</option>
                                <option value="저축은행">저축은행</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">계좌분류</label>
                            <select id="filter-status-account" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="수시입출금">수시입출금</option>
                                <option value="은행예금">은행예금</option>
                                <option value="ISA">ISA</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[120px] flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">종목명</label>
                            <input type="text" id="filter-status-name" placeholder="종목명 입력..." class="w-full text-xs input-bg rounded-md px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-[#5850EC]">
                        </div>
                        
                        <button class="bg-[#5850EC] hover:bg-[#4B43D3] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="fetchStatusHistory(1)">
                            <i data-lucide="search" class="w-3.5 h-3.5"></i> 검색
                        </button>
                    </div>

                    <!-- 데이터 리스트 카드 -->
                    <div class="card-bg p-4 rounded-xl shadow-xl flex flex-col overflow-hidden flex-1">
                        <div class="overflow-x-auto custom-scrollbar text-sm flex-1">
                            <table class="w-full text-left border-collapse whitespace-nowrap">
                                <thead class="bg-[#141416] text-slate-400 uppercase font-medium border-b border-[#232329]">
                                    <tr>
                                        <th class="p-2.5">입금일</th>
                                        <th class="p-2.5">만기일</th>
                                        <th class="p-2.5">금융기관분류</th>
                                        <th class="p-2.5">금융기관명</th>
                                        <th class="p-2.5">계좌분류</th>
                                        <th class="p-2.5">자산분류</th>
                                        <th class="p-2.5 text-left">종목명</th>
                                        <th class="p-2.5">상태</th>
                                        <th class="p-2.5 text-right">금액</th>
                                        <th class="p-2.5 text-right">이자</th>
                                        <th class="p-2.5 text-right">수수료/세금</th>
                                        <th class="p-2.5 text-right pr-10">총금액</th>
                                    </tr>
                                </thead>
                                <tbody id="table-status-body" class="divide-y divide-[#232329] text-slate-300">
                                    <tr><td colspan="12" class="p-4 text-center">예적금 데이터를 불러오는 중입니다.</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div id="pagination-status" class="pagination-container flex justify-center gap-1 mt-4"></div>
                    </div>
                </div>

                <!-- 2. 거래내역 뷰 -->
                <div id="main-trade" class="space-y-3 w-full flex-1 flex flex-col" style="display: none;">
                    
                    <!-- 필터 카드 -->
                    <div id="filter-box" class="card-bg py-5 px-3 rounded-lg shadow-xl flex flex-wrap items-center gap-3 text-sm shrink-0">
                        <div class="flex items-center gap-1">
                            <input type="month" id="filter-date" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC] w-36">
                        </div>
                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">기관분류</label>
                            <select id="filter-inst-category" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="은행">은행</option>
                                <option value="증권">증권</option>
                                <option value="저축은행">저축은행</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">계좌분류</label>
                            <select id="filter-account" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="수시입출금">수시입출금</option>
                                <option value="은행예금">은행예금</option>
                                <option value="ISA">ISA</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">상태</label>
                            <select id="filter-status" class="bg-[#141416] text-xs text-slate-300 rounded-md px-2.5 py-2.5 border border-[#232329] focus:outline-none focus:border-[#5850EC]">
                                <option value="">전체</option>
                                <option value="유지">유지</option>
                                <option value="해지">해지</option>
                                <option value="만기">만기</option>
                            </select>
                        </div>
                        <div class="flex-1 min-w-[120px] flex items-center gap-1">
                            <label class="text-xs text-slate-400 whitespace-nowrap">종목명</label>
                            <input type="text" id="filter-name" placeholder="종목명 입력..." class="w-full text-xs input-bg rounded-md px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-[#5850EC]">
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <button class="bg-[#5850EC] hover:bg-[#4B43D3] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="fetchTradeHistory(1)">
                                <i data-lucide="search" class="w-3.5 h-3.5"></i> 검색
                            </button>
                            <button class="bg-[#8B5CF6] hover:bg-[#7C3AED] text-white text-xs font-semibold px-4 py-3 rounded-md transition flex items-center justify-center gap-1 focus:outline-none" onclick="openRegisterModal()">
                                <i data-lucide="plus-circle" class="w-3.5 h-3.5"></i> 등록
                            </button>
                        </div>
                    </div>

                    <!-- 데이터 리스트 카드 -->
                    <div class="card-bg p-4 rounded-xl shadow-xl flex flex-col overflow-hidden flex-1">
                        <div class="overflow-x-auto custom-scrollbar text-sm flex-1">
                            <table id="data-table" class="w-full text-left border-collapse whitespace-nowrap">
                                <thead class="bg-[#141416] text-slate-400 uppercase font-medium border-b border-[#232329]">
                                    <tr>
                                        <th class="p-2.5">입금일</th>
                                        <th class="p-2.5">만기일</th>
                                        <th class="p-2.5">금융기관분류</th>
                                        <th class="p-2.5">금융기관명</th>
                                        <th class="p-2.5">계좌분류</th>
                                        <th class="p-2.5">자산분류</th>
                                        <th class="p-2.5 text-left">종목명</th>
                                        <th class="p-2.5">상태</th>
                                        <th class="p-2.5 text-right">금액</th>
                                        <th class="p-2.5 text-right">이자</th>
                                        <th class="p-2.5 text-right">수수료/세금</th>
                                        <th class="p-2.5 text-right pr-10">총금액</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body" class="divide-y divide-[#232329] text-slate-300">
                                    <tr><td colspan="12" class="p-4 text-center">예적금 데이터를 불러오는 중입니다.</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div id="pagination" class="pagination-container flex justify-center gap-1 mt-4"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 등록/수정 모달 -->
    <div id="register-modal" class="hidden fixed inset-0 bg-black/60 z-50 overflow-y-auto flex items-center justify-center p-4">
        <div id="draggable-modal" class="card-bg rounded-xl shadow-2xl w-full max-w-4xl border border-[#232329] flex flex-col overflow-hidden transform transition-all animate-in fade-in zoom-in-95 duration-200">
            <div class="px-4 py-3 bg-[#141416] border-b border-[#232329] flex items-center justify-between cursor-move" id="modal-header-drag">
                <h2 class="text-base font-bold text-white flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-[#5850EC]"></i> 예적금 내역 등록
                </h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition focus:outline-none">&times;</button>
            </div>
            
            <form id="register-form" onsubmit="saveTradeHistory(event)">
                <input type="hidden" id="modal_trade_id" name="id"> 
                <div class="p-5 grid grid-cols-1 md:grid-cols-4 gap-4 text-xs">
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-400 font-semibold">입금일</label>
                        <input type="date" id="deposit_date" name="deposit_date" required class="input-bg rounded-md px-3 py-2 text-slate-200 focus:outline-none focus:border-[#5850EC]">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-400 font-semibold">만기일 (선택)</label>
                        <input type="date" id="maturity_date" name="maturity_date" class="input-bg rounded-md px-3 py-2 text-slate-200 focus:outline-none focus:border-[#5850EC]">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-400 font-semibold">기관분류</label>
                        <select name="inst_category" required class="bg-[#111114] border border-[#232329] rounded-md px-3 py-2 text-slate-200 focus:outline-none focus:border-[#5850EC]">
                            <option value="은행">은행</option>                            
                            <option value="증권">증권</option>
                            <option value="저축은행">저축은행</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-400 font-semibold">금융기관명</label>
                        <input type="text" name="inst_name" placeholder="예: 웰컴저축, 신협 등" required class="input-bg rounded-md px-3 py-2 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#5850EC]">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-400 font-semibold">계좌분류</label>
                        <select name="account_category" required class="bg-[#111114] border border-[#232329] rounded-md px-3 py-2 text-slate-200 focus:outline-none focus:border-[#5850EC]">
                            <option value="수시입출금">수시입출금</option>
                            <option value="은행예금">은행예금</option>
                            <option value="ISA">ISA</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-400 font-semibold">자산분류</label>
                        <select name="asset_category" required class="bg-[#111114] border border-[#232329] rounded-md px-3 py-2 text-slate-200 focus:outline-none focus:border-[#5850EC]">
                            <option value="현금">현금</option>
                            <option value="예금">예금</option>
                            <option value="채권">채권</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1 md:col-span-2">
                        <label class="text-slate-400 font-semibold">종목명</label>
                        <input type="text" name="product_name" placeholder="상품명 또는 종목명" required class="input-bg rounded-md px-3 py-2 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#5850EC]">
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <label class="text-slate-400 font-semibold">상태</label>
                        <select name="status" required class="bg-[#111114] border border-[#232329] rounded-md px-3 py-2 text-slate-200 focus:outline-none focus:border-[#5850EC]">
                            <option value="유지">유지</option>
                            <option value="해지">해지</option>
                            <option value="만기">만기</option>
                        </select>
                    </div>

    <script>
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';

        let _supabase;

        let currentPage = 1;

        function setPlaceholderDate() {
            const dateInput = document.getElementById('filter-date');

        async function fetchStatusHistory(page = 1) {
            if(!_supabase) return;
            currentStatusPage = page;
            const body = document.getElementById('table-status-body');
            body.innerHTML = '<tr><td colspan="12" class="p-4 text-center text-slate-400">조회 중...</td></tr>';

            const fMonth = document.getElementById('filter-status-date').value;
            const fInstCat = document.getElementById('filter-status-inst-category').value;
            const fAccount = document.getElementById('filter-status-account').value;
            const fName = document.getElementById('filter-status-name').value;

            let query = _supabase.from('deposit_management').select('*', { count: 'exact' });
            query = query.eq('status', '유지');

            if (fMonth && fMonth.trim() !== "") {
                const parts = fMonth.split('-');
                const startDate = `${fMonth}-01`;
                const lastDay = new Date(parseInt(parts[0]), parseInt(parts[1]), 0).getDate();
                const endDate = `${fMonth}-${lastDay < 10 ? '0' + lastDay : lastDay}`;
                query = query.gte('deposit_date', startDate).lte('deposit_date', endDate);
            }
            
            if (fInstCat) query = query.eq('inst_category', fInstCat);
            if (fAccount) query = query.eq('account_category', fAccount);
            if (fName) query = query.ilike('product_name', `%${fName}%`);

            const from = (currentStatusPage - 1) * itemsPerPage;
            const to = from + itemsPerPage - 1;

            const { data, error, count } = await query
                .order('deposit_date', { ascending: false })
                .range(from, to);

            if (error) {
                body.innerHTML = `<tr><td colspan="12" class="p-4 text-center text-red-500">데이터를 불러오는 중 오류가 발생했습니다: ${error.message}</td></tr>`;
                renderStatusPagination(0);
                return;
            }

            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="12" class="p-4 text-center text-slate-500">유지 중인 종목 현황이 없습니다.</td></tr>';
                renderStatusPagination(0);
                updateLastUpdatedTime();
                return;
            }

            body.innerHTML = data.map(item => {
                const itemStr = encodeURIComponent(JSON.stringify(item));
                return `
                    <tr class="hover:bg-[#1C1C20] transition border-b border-[#232329]">
                        <td class="p-2.5 text-center text-slate-400">${item.deposit_date}</td>
                        <td class="p-2.5 text-center text-slate-400">${item.maturity_date || '-'}</td>
                        <td class="p-2.5 text-center text-slate-300">${item.inst_category}</td>
                        <td class="p-2.5 text-slate-300">${item.inst_name}</td>
                        <td class="p-2.5 text-center text-slate-300">${item.account_category}</td>
                        <td class="p-2.5 text-center text-slate-300">${item.asset_category}</td>
                        <td class="p-2.5 text-left font-medium text-white max-w-[200px] truncate underline decoration-[#5850EC] cursor-pointer hover:text-indigo-400" data-item="${itemStr}" onclick="openEditModal(this)">
                            ${item.product_name}
                        </td>
                        <td class="p-2.5 text-center text-slate-300">${item.status}</td>
                        <td class="p-2.5 text-right text-slate-300">${Number(item.amount).toLocaleString()}</td>
                        <td class="p-2.5 text-right text-slate-300">${Number(item.interest).toLocaleString()}</td>
                        <td class="p-2.5 text-right text-slate-400">${Number(item.tax_expense).toLocaleString()}</td>
                        <td class="p-2.5 text-right pr-10 font-bold text-[#10B981]">${Number(item.total_amount).toLocaleString()}</td>
                    </tr>
                `;
            }).join('');

            renderStatusPagination(count);

            // 마지막 데이터 업데이트 시간 갱신
            updateLastUpdatedTime();
        }

            const fMonth = document.getElementById('filter-date').value;

            let query = _supabase.from('deposit_management').select('*', { count: 'exact' });

                const parts = fMonth.split('-');
                const startDate = `${fMonth}-01`;

            renderPagination(count);

            // 마지막 데이터 업데이트 시간 갱신

        }

        function renderStatusPagination(totalCount) {
            const pagination = document.getElementById('pagination-status');
            const totalPages = Math.max(1, Math.ceil(totalCount / itemsPerPage));
            
            let html = '';
            const maxButtons = 5; 
            let startPage = Math.max(1, currentStatusPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            html += `<button class="page-btn" ${currentStatusPage === 1 ? 'disabled' : ''} onclick="fetchStatusHistory(1)">«</button>`;
            html += `<button class="page-btn" ${currentStatusPage === 1 ? 'disabled' : ''} onclick="fetchStatusHistory(${Math.max(1, currentStatusPage - 1)})">‹</button>`;

            for (let i = startPage; i <= endPage; i++) {
                if (i > 0) {
                    html += `<button class="page-btn ${i === currentStatusPage ? 'active' : ''}" onclick="fetchStatusHistory(${i})">${i}</button>`;
                }
            }

            html += `<button class="page-btn" ${currentStatusPage === totalPages ? 'disabled' : ''} onclick="fetchStatusHistory(${Math.min(totalPages, currentStatusPage + 1)})">›</button>`;
            html += `<button class="page-btn" ${currentStatusPage === totalPages ? 'disabled' : ''} onclick="fetchStatusHistory(${totalPages})">»</button>`;

            pagination.innerHTML = html;
        }

        function renderPagination(totalCount) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.max(1, Math.ceil(totalCount / itemsPerPage));
            
            let html = '';
            const maxButtons = 5; 
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchTradeHistory(1)">«</button>`;
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchTradeHistory(${Math.max(1, currentPage - 1)})">‹</button>`;

            for (let i = startPage; i <= endPage; i++) {
                if (i > 0) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="fetchTradeHistory(${i})">${i}</button>`;
                }
            }

            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchTradeHistory(${Math.min(totalPages, currentPage + 1)})">›</button>`;
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchTradeHistory(${totalPages})">»</button>`;

            pagination.innerHTML = html;
        }

        async function loadUserInfo() {
            if (!_supabase) return;
            try {
                const { data: { session } } = await _supabase.auth.getSession();
                const userEmailEl = document.getElementById('user-email');
                if (userEmailEl) {
                    if (session && session.user) {
                        const email = session.user.email || "";
                        userEmailEl.innerText = email.split('@')[0];
                    } else {
                        userEmailEl.innerText = 'Guest';
                    }
                }
            } catch (e) {
                console.error("사용자 정보 가져오기 실패:", e);
                const userEmailEl = document.getElementById('user-email');
                if (userEmailEl) userEmailEl.innerText = 'Error';
            }
        }

        function switchView(view) {
            const btnStatus = document.getElementById('btn-status');
            const btnTrade = document.getElementById('btn-trade');
            const mainStatus = document.getElementById('main-status');
            const mainTrade = document.getElementById('main-trade');

            if (view === 'trade') {
                btnStatus.className = "w-full flex items-center gap-2 text-slate-400 hover:bg-[#1C1C20] hover:text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                btnTrade.className = "w-full flex items-center gap-2 bg-[#232329] text-white px-3 py-2 rounded-lg text-base font-medium transition focus:outline-none";
                
                // 아이콘 색상 교체
                const iconStatus = btnStatus.querySelector('i, svg');
                const iconTrade = btnTrade.querySelector('i, svg');
                if (iconStatus) iconStatus.classList.remove('text-[#5850EC]');
                if (iconTrade) iconTrade.classList.add('text-[#5850EC]');

                mainStatus.style.display = 'none'; 
                mainTrade.style.display = 'flex'; 
                fetchTradeHistory(1);

                const iconStatus = btnStatus.querySelector('i, svg');
                const iconTrade = btnTrade.querySelector('i, svg');

        function openRegisterModal() {
            const modalOverlay = document.getElementById('register-modal');
            const modalContent = document.getElementById('draggable-modal');
            
            if (modalOverlay && modalContent) {
                modalOverlay.classList.remove('hidden');
                modalContent.style.transform = 'none';

        function openEditModal(element) {
            const itemStr = element.getAttribute('data-item');
            const item = JSON.parse(decodeURIComponent(itemStr));
            openRegisterModal();
            
            document.querySelector('#draggable-modal h2').innerText = '예적금 내역 수정';
            document.getElementById('btn-submit-modal').innerText = '수정 완료';
            
            const form = document.getElementById('register-form');
            
            document.getElementById('modal_trade_id').value = item.id; 
            form.elements['deposit_date'].value = item.deposit_date;
            form.elements['maturity_date'].value = item.maturity_date || '';
            form.elements['inst_category'].value = item.inst_category;
            form.elements['inst_name'].value = item.inst_name;
            form.elements['account_category'].value = item.account_category;
            form.elements['asset_category'].value = item.asset_category;
            form.elements['product_name'].value = item.product_name;
            form.elements['status'].value = item.status;

        function calculateAmounts() {
            const amt = parseFloat(document.getElementById('modal_amount').value) || 0;
            const interest = parseFloat(document.getElementById('modal_interest').value) || 0;
            const tax = parseFloat(document.getElementById('modal_tax').value) || 0;
            document.getElementById('modal_total').value = (amt + interest - tax).toFixed(2);
        }

        async function saveTradeHistory(event) {
            if (event) event.preventDefault(); 
            if(!_supabase) return;

            const form = document.getElementById('register-form');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            if(!data.maturity_date) data.maturity_date = null;
			
			const tradeId = document.getElementById('modal_trade_id').value;
			delete data.id;
			
            try {
                if (tradeId) {
                    const { error } = await _supabase
                        .from('deposit_management')
                        .update(data)
                        .eq('id', tradeId);
                        
                    if (error) throw error;
                    alert('수정되었습니다.');
                } else {
                    const { error } = await _supabase
                        .from('deposit_management')
                        .insert([data]);
                        
                    if (error) throw error;
                    alert('저장되었습니다.');
                }
                
                closeModal();
                
                if (document.getElementById('main-trade').style.display !== 'none') {
                    fetchTradeHistory(currentPage);
                } else {
                    fetchStatusHistory(currentStatusPage);
                }
                
            } catch (err) {
                alert('처리 중 에러가 발생했습니다: ' + err.message);
            }
        }

        function closeModal() { 
			document.getElementById('register-modal').classList.add('hidden'); 
            document.querySelector('#draggable-modal h2').innerText = '예적금 내역 등록';
            document.getElementById('btn-submit-modal').innerText = '저장';
            document.getElementById('modal_trade_id').value = '';
            document.getElementById('register-form').reset();
		}
		
        function makeModalDraggable(modalEl, headerEl) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (headerEl) {
                headerEl.onmousedown = dragMouseDown;
            } else {
                modalEl.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                if (['INPUT', 'SELECT', 'BUTTON', 'TEXTAREA'].includes(e.target.tagName)) return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                modalEl.style.transform = 'none'; 
                modalEl.style.top = (modalEl.offsetTop - pos2) + "px";
                modalEl.style.left = (modalEl.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            // Lucide 아이콘 렌더링
            lucide.createIcons();

            // 로그인 사용자 연동
            await loadUserInfo();

            setPlaceholderDate();
            switchView('status'); 
            
            const modal = document.getElementById('draggable-modal');
            const header = document.getElementById('modal-header-drag');
            if (modal && header) {
                makeModalDraggable(modal, header);
            }
        });

        /**
         * 헤더의 마지막 데이터 업데이트 시간을 현재 시각으로 갱신하는 함수
         */
        function updateLastUpdatedTime() {
            const el = document.getElementById('last-updated-text');
            if (!el) return;
            const now = new Date();
            el.innerText = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
