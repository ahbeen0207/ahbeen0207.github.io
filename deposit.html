<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식관리 시스템 - 예적금</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --vv-bg-main: #121212;
            --vv-bg-card: #2c2c2c;
            --vv-border: #3d3d3d;
            --vv-text-main: rgba(255, 255, 255, 0.95);
            --vv-text-muted: rgba(255, 255, 255, 0.65);
            --vv-text-mint: #03dac6;
            --point-blue: #3b82f6;
            --point-green: #2ecc71;
            --point-purple: #a855f7;
            --sidebar-width: 160px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--vv-bg-main); color: var(--vv-text-main); font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; height: 100vh; padding: 20px 10%; overflow: hidden; }

        /* 상단 및 좌측 레이아웃 */
        .top-section { display: flex; gap: 12px; height: 60px; margin-bottom: 12px; flex-shrink: 0; }
        .logo-box { width: var(--sidebar-width); height: 60px; border: 1px solid var(--vv-border); border-radius: 8px; display: flex; justify-content: center; align-items: center; background-color: var(--vv-bg-card); padding: 2px; overflow: hidden; }
        .logo-box img { height: 54px; width: auto; object-fit: cover; border-radius: 6px; }
        .header-menu { flex: 1; border: 1px solid var(--vv-border); border-radius: 8px; display: flex; background-color: var(--vv-bg-card); overflow: hidden; }
        .header-menu a { flex: 1; display: flex; justify-content: center; align-items: center; text-decoration: none; color: var(--vv-text-main); font-weight: 600; border-right: 1px solid var(--vv-border); transition: 0.2s; }
        .header-menu a.active { background-color: var(--point-blue); color: white; }

        .wrapper { display: flex; flex: 1; gap: 12px; overflow: hidden; }
        nav { 
			width: var(--sidebar-width); 
			border: 1px solid var(--vv-border); 
			border-radius: 12px; 
			padding: 15px 10px 20px 10px; 
			display: flex; 
			flex-direction: column; 
			background-color: var(--vv-bg-card); 
		}
		nav .nav-btn + .nav-btn { margin-top: 20px; }
        .nav-btn { width: 100%; padding: 12px 0; background: var(--vv-bg-main); border: 1px solid var(--vv-border); color: var(--vv-text-main); border-radius: 8px; cursor: pointer; font-weight: 600; }
        .nav-btn.active { background-color: var(--point-green); border-color: var(--point-green); color: white; }
		
		.sidebar-logo-box {
			width: 70%;                  
			height: 70px;                
			display: flex;
			justify-content: center;
			align-items: center;
			margin: 0 auto 25px auto;    
			overflow: hidden;
			border-radius: 8px;
			border: 1px solid var(--vv-border);
			background-color: var(--vv-bg-main);
		}
		.sidebar-logo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 메인 페이지 영역 */
        main { flex: 1; border: 1px solid var(--vv-border); border-radius: 12px; background-color: var(--vv-bg-card); padding: 24px; display: flex; flex-direction: column; overflow: hidden; }
        .filter-container { display: flex; flex-wrap: wrap; align-items: center; gap: 15px; background: var(--vv-bg-main); padding: 15px 20px; border-radius: 8px; border: 1px solid var(--vv-border); margin-bottom: 20px; }
        .filter-item { display: flex; align-items: center; gap: 8px; }
        .filter-item label { color: var(--vv-text-mint); font-size: 13px; white-space: nowrap; }
        .filter-item input, .filter-item select { background: var(--vv-bg-card); border: 1px solid var(--vv-border); color: white; padding: 6px 10px; border-radius: 4px; font-size: 13px;}
        
        .filter-date-class { width: 150px; }
        .filter-name-class { width: 120px; }

        .button-group { margin-left: auto; display: flex; gap: 8px; }
        .btn { padding: 8px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
        .btn-blue { background-color: var(--point-blue); }
        .btn-indigo { background-color: var(--point-purple); }

        .table-area { flex: 1; overflow: auto; border: 1px solid var(--vv-border); border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { position: sticky; top: 0; background: #333; color: var(--vv-text-mint); font-size: 12px; padding: 12px 8px; border-bottom: 2px solid var(--vv-border); text-align: center; }
        td { padding: 10px 8px; border-bottom: 1px solid var(--vv-border); font-size: 13px; text-align: center; color: var(--vv-text-main); }
        tr:hover { background-color: rgba(255,255,255,0.03); }

        /* 등록 모달 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-content { position: absolute; background: var(--vv-bg-card); width: 950px; border-radius: 12px; border: 1px solid var(--vv-border); left: 50%; transform: translateX(-50%); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { padding: 12px 16px; background: #333; border-bottom: 1px solid var(--vv-border); display: flex; justify-content: space-between; align-items: center; cursor: move; border-radius: 12px 12px 0 0; }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; color: var(--vv-text-muted); }
        .form-group input, .form-group select { background: var(--vv-bg-main); border: 1px solid var(--vv-border); color: white; padding: 8px; border-radius: 4px; font-size: 13px; }
        .modal-footer { padding: 16px; border-top: 1px solid var(--vv-border); display: flex; justify-content: flex-end; gap: 8px; }

        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 4px; margin-top: 20px; padding: 10px 0; user-select: none; flex-shrink: 0; }
        .page-btn { background-color: #333; border: 1px solid var(--vv-border); color: #ccc; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 13px; min-width: 32px; text-align: center; transition: 0.2s; }
        .page-btn:hover:not(:disabled) { background-color: #444; color: white; border-color: var(--vv-text-mint); }
        .page-btn.active { background-color: var(--point-blue); color: white; border-color: var(--point-blue); font-weight: bold; }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; background-color: #222; }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="month"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="logo-box">
			<a href="select_page.html" style="color: var(--vv-text-mint); font-weight: bold; text-decoration: none; font-size: 16px; letter-spacing: 1px;">HOME</a>
		</div>
        <div class="header-menu">
            <a href="dashboard.html">자산현황</a>
            <a href="stock.html">주식투자</a>
            <a href="stock_ipo.html">공모주투자</a>
            <a href="#" class="active">예적금</a>
            <a href="#" class="nav-item" onclick="location.reload(true); return false;">새로고침</a>
        </div>
    </div>

    <div class="wrapper">
        <nav>
			<div class="sidebar-logo-box"><img src="rabbit.jpg" alt="로고" onerror="this.src=''"></div>
            <button id="btn-status" class="nav-btn" onclick="switchView('status')">종목별현황</button>
            <button id="btn-trade" class="nav-btn active" onclick="switchView('trade')">거래내역</button>
        </nav>

        <main id="main-status" style="display: none;">
            <div class="filter-container">
                <div class="filter-item">
                    <input type="text" id="filter-status-date" class="filter-date-class" placeholder="입금월 선택" onfocus="(this.type='month')" onblur="if(!this.value)this.type='text'">
                </div>
                <div class="filter-item"><label>기관분류</label>
                    <select id="filter-status-inst-category"><option value="">전체</option><option value="은행">은행</option><option value="증권">증권</option><option value="저축은행">저축은행</option></select>
                </div>
                <div class="filter-item"><label>계좌분류</label>
                    <select id="filter-status-account"><option value="">전체</option><option value="수시입출금">수시입출금</option><option value="은행예금">은행예금</option><option value="ISA">ISA</option></select>
                </div>
                <div class="filter-item"><label>종목명</label><input type="text" id="filter-status-name" class="filter-name-class"></div>
                
                <div class="button-group">
                    <button class="btn btn-blue" onclick="fetchStatusHistory(1)">검색</button>
                </div>
            </div>

            <div class="table-area">
                <table>
                    <thead>
                        <tr>
                            <th>입금일</th><th>만기일</th><th>금융기관분류</th><th>금융기관명</th><th>계좌분류</th><th>자산분류</th><th>종목명</th><th>상태</th><th>금액</th><th>이자</th><th>수수료/세금</th><th>총금액</th>
                        </tr>
                    </thead>
                    <tbody id="table-status-body"></tbody>
                </table>
            </div>
            <div id="pagination-status" class="pagination-container"></div>
        </main>

        <main id="main-trade">
            <div id="filter-box" class="filter-container">
                <div class="filter-item">
                    <input type="text" id="filter-date" class="filter-date-class" placeholder="입금월 선택" onfocus="(this.type='month')" onblur="if(!this.value)this.type='text'">
                </div>
                <div class="filter-item"><label>기관분류</label>
                    <select id="filter-inst-category"><option value="">전체</option><option value="은행">은행</option><option value="증권">증권</option><option value="저축은행">저축은행</option></select>
                </div>
                <div class="filter-item"><label>계좌분류</label>
                    <select id="filter-account"><option value="">전체</option><option value="수시입출금">수시입출금</option><option value="은행예금">은행예금</option><option value="ISA">ISA</option></select>
                </div>
                <div class="filter-item"><label>상태</label>
                    <select id="filter-status"><option value="">전체</option><option value="유지">유지</option><option value="해지">해지</option><option value="만기">만기</option></select>
                </div>
                <div class="filter-item"><label>종목명</label><input type="text" id="filter-name" class="filter-name-class"></div>
                
                <div class="button-group">
                    <button class="btn btn-blue" onclick="fetchTradeHistory(1)">검색</button>
                    <button class="btn btn-indigo" onclick="openRegisterModal()">등록</button>
                </div>
            </div>

            <div class="table-area">
                <table id="data-table">
                    <thead>
                        <tr>
                            <th>입금일</th><th>만기일</th><th>금융기관분류</th><th>금융기관명</th><th>계좌분류</th><th>자산분류</th><th>종목명</th><th>상태</th><th>금액</th><th>이자</th><th>수수료/세금</th><th>총금액</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <div id="pagination" class="pagination-container"></div>
        </main>
    </div>

    <div id="register-modal" class="modal-overlay">
        <div id="draggable-modal" class="modal-content">
            <div class="modal-header" id="modal-header-drag">
                <h2 style="color:var(--vv-text-mint); font-size:1rem;">예적금 내역 등록</h2>
                <button style="background:none; border:none; color:white; cursor:pointer; font-size:20px;" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="register-form" onsubmit="saveTradeHistory(event)">
				<input type="hidden" id="modal_trade_id" name="id"> 
                <div class="form-grid">
                    <div class="form-group">
                        <label>입금일</label>
                        <input type="date" id="deposit_date" name="deposit_date" required>
                    </div>
                    <div class="form-group">
                        <label>만기일 (선택)</label>
                        <input type="date" id="maturity_date" name="maturity_date">
                    </div>
                    <div class="form-group">
                        <label>기관분류</label>
                        <select name="inst_category" required>
                            <option value="은행">은행</option>                            
                            <option value="증권">증권</option>
                            <option value="저축은행">저축은행</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>금융기관명</label>
                        <input type="text" name="inst_name" placeholder="예: 웰컴저축, 신협 등" required>
                    </div>
                    <div class="form-group">
                        <label>계좌분류</label>
                        <select name="account_category" required>
                            <option value="수시입출금">수시입출금</option>
                            <option value="은행예금">은행예금</option>
                            <option value="ISA">ISA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>자산분류</label>
                        <select name="asset_category" required>
                            <option value="현금">현금</option>
                            <option value="예금">예금</option>
                            <option value="채권">채권</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>종목명</label>
                        <input type="text" name="product_name" placeholder="상품명 또는 종목명" required>
                    </div>
                    
                    <div class="form-group">
                        <label>상태</label>
                        <select name="status" required>
                            <option value="유지">유지</option>
                            <option value="해지">해지</option>
                            <option value="만기">만기</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>금액</label>
                        <input type="number" step="0.01" id="modal_amount" name="amount" oninput="calculateAmounts()" placeholder="0" required>
                    </div>
                    <div class="form-group">
                        <label>이자</label>
                        <input type="number" step="0.01" id="modal_interest" name="interest" oninput="calculateAmounts()" value="0">
                    </div>
                    <div class="form-group">
                        <label>수수료/세금</label>
                        <input type="number" step="0.01" id="modal_tax" name="tax_expense" oninput="calculateAmounts()" value="0">
                    </div>
                    <div class="form-group">
                        <label>총금액</label>
                        <input type="number" step="0.01" id="modal_total" name="total_amount" readonly style="background-color: #333; color: var(--point-green); font-weight: bold;" value="0">
                    </div>
                </div>
                <div class="form-group full-width" style="margin-top: 15px; padding: 0 20px;">
                    <label>비고</label>
                    <textarea name="description" rows="2" placeholder="참고사항 입력" style="width:100%; background:#1e1e1e; border:1px solid #3d3d3d; color:white; padding:8px; border-radius:4px; font-family:inherit;"></textarea>
                </div>
				<div class="modal-footer" style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
					<button type="button" class="btn" onclick="closeModal()" style="background:#444;">취소</button>
					<button type="submit" id="btn-submit-modal" class="btn btn-blue">저장</button>
				</div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pdinnikiwwtofkoxdxbb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_5rPciNN5aQEMljwLY4Hn7g_CUcjCJ_l'; 
        
        let _supabase;
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch(e) {
            console.error("Supabase 초기화 실패:", e);
        }

        let currentPage = 1;
        let currentStatusPage = 1;
        const itemsPerPage = 15;

        function setPlaceholderDate() {
            const dateInput = document.getElementById('filter-date');
            if(dateInput) {
                dateInput.placeholder = "입금월 선택";
                dateInput.value = "";
            }
            const statusDateInput = document.getElementById('filter-status-date');
            if(statusDateInput) {
                statusDateInput.placeholder = "입금월 선택";
                statusDateInput.value = "";
            }
        }

        async function fetchStatusHistory(page = 1) {
            if(!_supabase) return;
            currentStatusPage = page;
            const body = document.getElementById('table-status-body');
            body.innerHTML = '<tr><td colspan="12">조회 중...</td></tr>';

            const fMonth = document.getElementById('filter-status-date').value;
            const fInstCat = document.getElementById('filter-status-inst-category').value;
            const fAccount = document.getElementById('filter-status-account').value;
            const fName = document.getElementById('filter-status-name').value;

            let query = _supabase.from('deposit_management').select('*', { count: 'exact' });
            query = query.eq('status', '유지');

            if (fMonth && fMonth.trim() !== "") {
                const parts = fMonth.split('-');
                const startDate = `${fMonth}-01`;
                const lastDay = new Date(parseInt(parts[0]), parseInt(parts[1]), 0).getDate();
                const endDate = `${fMonth}-${lastDay < 10 ? '0' + lastDay : lastDay}`;
                query = query.gte('deposit_date', startDate).lte('deposit_date', endDate);
            }
            
            if (fInstCat) query = query.eq('inst_category', fInstCat);
            if (fAccount) query = query.eq('account_category', fAccount);
            if (fName) query = query.ilike('product_name', `%${fName}%`);

            const from = (currentStatusPage - 1) * itemsPerPage;
            const to = from + itemsPerPage - 1;

            const { data, error, count } = await query
                .order('deposit_date', { ascending: false })
                .range(from, to);

            if (error) {
                body.innerHTML = `<tr><td colspan="12" style="color:#ff4b4b">에러: ${error.message}</td></tr>`;
                renderStatusPagination(0);
                return;
            }

            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="12">유지 중인 종목 현황이 없습니다.</td></tr>';
                renderStatusPagination(0);
                return;
            }

			body.innerHTML = data.map(item => {
				const itemStr = encodeURIComponent(JSON.stringify(item));
				return `
					<tr>
						<td>${item.deposit_date}</td>
						<td>${item.maturity_date || '-'}</td>
						<td>${item.inst_category}</td>
						<td>${item.inst_name}</td>
						<td>${item.account_category}</td>
						<td>${item.asset_category}</td>
						<td style="text-align: left; padding-left: 15px;">
							<span style="cursor: pointer; text-decoration: underline;" data-item="${itemStr}" onclick="openEditModal(this)">
								${item.product_name}
							</span>
						</td>
						<td style="color:inherit">${item.status}</td>
						<td style="text-align: right;">${Number(item.amount).toLocaleString()}</td>
						<td style="text-align: right;">${Number(item.interest).toLocaleString()}</td>
						<td style="text-align: right;">${Number(item.tax_expense).toLocaleString()}</td>
						<td style="text-align: right; color: var(--point-green); font-weight: bold;">${Number(item.total_amount).toLocaleString()}</td>
					</tr>
				`;
			}).join('');

            renderStatusPagination(count);
        }

        async function fetchTradeHistory(page = 1) {
            if(!_supabase) return;
            currentPage = page;
            const body = document.getElementById('table-body');
            body.innerHTML = '<tr><td colspan="12">조회 중...</td></tr>';

            const fMonth = document.getElementById('filter-date').value;
            const fInstCat = document.getElementById('filter-inst-category').value;
            const fAccount = document.getElementById('filter-account').value;
            const fStatus = document.getElementById('filter-status').value;
            const fName = document.getElementById('filter-name').value;

            let query = _supabase.from('deposit_management').select('*', { count: 'exact' });

            if (fMonth && fMonth.trim() !== "") {
                const parts = fMonth.split('-');
                const startDate = `${fMonth}-01`;
                const lastDay = new Date(parseInt(parts[0]), parseInt(parts[1]), 0).getDate();
                const endDate = `${fMonth}-${lastDay < 10 ? '0' + lastDay : lastDay}`;
                query = query.gte('deposit_date', startDate).lte('deposit_date', endDate);
            }
            
            if (fInstCat) query = query.eq('inst_category', fInstCat);
            if (fAccount) query = query.eq('account_category', fAccount);
            if (fStatus) query = query.eq('status', fStatus);
            if (fName) query = query.ilike('product_name', `%${fName}%`);

            const from = (currentPage - 1) * itemsPerPage;
            const to = from + itemsPerPage - 1;

            const { data, error, count } = await query
                .order('deposit_date', { ascending: false })
                .range(from, to);

            if (error) {
                body.innerHTML = `<tr><td colspan="12" style="color:#ff4b4b">에러: ${error.message}</td></tr>`;
                renderPagination(0);
                return;
            }

            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="12">내역이 없습니다.</td></tr>';
                renderPagination(0);
                return;
            }

			body.innerHTML = data.map(item => {
				const itemStr = encodeURIComponent(JSON.stringify(item));
				return `
					<tr>
						<td>${item.deposit_date}</td>
						<td>${item.maturity_date || '-'}</td>
						<td>${item.inst_category}</td>
						<td>${item.inst_name}</td>
						<td>${item.account_category}</td>
						<td>${item.asset_category}</td>
						<td style="text-align: left; padding-left: 15px;">
							<span style="cursor: pointer; text-decoration: underline;" data-item="${itemStr}" onclick="openEditModal(this)">
								${item.product_name}
							</span>
						</td>
						<td style="color:${item.status === '해지' ? '#888' : 'inherit'}">${item.status}</td>
						<td style="text-align: right;">${Number(item.amount).toLocaleString()}</td>
						<td style="text-align: right;">${Number(item.interest).toLocaleString()}</td>
						<td style="text-align: right;">${Number(item.tax_expense).toLocaleString()}</td>
						<td style="text-align: right; color: var(--point-green); font-weight: bold;">${Number(item.total_amount).toLocaleString()}</td>
					</tr>
				`;
			}).join('');

            renderPagination(count);
        }

        function renderStatusPagination(totalCount) {
            const pagination = document.getElementById('pagination-status');
            const totalPages = Math.max(1, Math.ceil(totalCount / itemsPerPage));
            
            let html = '';
            const maxButtons = 5; 
            let startPage = Math.max(1, currentStatusPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            html += `<button class="page-btn" ${currentStatusPage === 1 ? 'disabled' : ''} onclick="fetchStatusHistory(1)">«</button>`;
            html += `<button class="page-btn" ${currentStatusPage === 1 ? 'disabled' : ''} onclick="fetchStatusHistory(${Math.max(1, currentStatusPage - 1)})">‹</button>`;

            for (let i = startPage; i <= endPage; i++) {
                if (i > 0) {
                    html += `<button class="page-btn ${i === currentStatusPage ? 'active' : ''}" onclick="fetchStatusHistory(${i})">${i}</button>`;
                }
            }

            html += `<button class="page-btn" ${currentStatusPage === totalPages ? 'disabled' : ''} onclick="fetchStatusHistory(${Math.min(totalPages, currentStatusPage + 1)})">›</button>`;
            html += `<button class="page-btn" ${currentStatusPage === totalPages ? 'disabled' : ''} onclick="fetchStatusHistory(${totalPages})">»</button>`;

            pagination.innerHTML = html;
        }

        function renderPagination(totalCount) {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.max(1, Math.ceil(totalCount / itemsPerPage));
            
            let html = '';
            const maxButtons = 5; 
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage + 1 < maxButtons) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchTradeHistory(1)">«</button>`;
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="fetchTradeHistory(${Math.max(1, currentPage - 1)})">‹</button>`;

            for (let i = startPage; i <= endPage; i++) {
                if (i > 0) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="fetchTradeHistory(${i})">${i}</button>`;
                }
            }

            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchTradeHistory(${Math.min(totalPages, currentPage + 1)})">›</button>`;
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="fetchTradeHistory(${totalPages})">»</button>`;

            pagination.innerHTML = html;
        }

        function switchView(view) {
            document.getElementById('btn-status').classList.toggle('active', view === 'status');
            document.getElementById('btn-trade').classList.toggle('active', view === 'trade');
            
            if (view === 'trade') {
                document.getElementById('main-status').style.display = 'none';
                document.getElementById('main-trade').style.display = 'flex';
                fetchTradeHistory(1); 
            } else {
                document.getElementById('main-status').style.display = 'flex';
                document.getElementById('main-trade').style.display = 'none';
                fetchStatusHistory(1); 
            }
        }

        function openRegisterModal() {
            const modalOverlay = document.getElementById('register-modal');
            const modalContent = document.getElementById('draggable-modal');
            const filterBox = document.getElementById('filter-box');
            
            if (modalOverlay && modalContent) {
                modalOverlay.style.display = 'block';
                modalContent.style.left = '50%';
                modalContent.style.transform = 'translateX(-50%)';
                
                if (filterBox) {
                    const rect = filterBox.getBoundingClientRect();
                    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                    modalContent.style.top = (rect.bottom + scrollTop + 5) + 'px';
                } else {
                    modalContent.style.top = '150px'; 
                }
            }
        }

        function openEditModal(element) {
            const itemStr = element.getAttribute('data-item');
            const item = JSON.parse(decodeURIComponent(itemStr));
            openRegisterModal();
            
            document.querySelector('#draggable-modal h2').innerText = '예적금 내역 수정';
            document.getElementById('btn-submit-modal').innerText = '수정 완료';
            
            const form = document.getElementById('register-form');
            
            document.getElementById('modal_trade_id').value = item.id; 
            form.elements['deposit_date'].value = item.deposit_date;
            form.elements['maturity_date'].value = item.maturity_date || '';
            form.elements['inst_category'].value = item.inst_category;
            form.elements['inst_name'].value = item.inst_name;
            form.elements['account_category'].value = item.account_category;
            form.elements['asset_category'].value = item.asset_category;
            form.elements['product_name'].value = item.product_name;
            form.elements['status'].value = item.status;
            
            document.getElementById('modal_amount').value = item.amount || 0;
            document.getElementById('modal_interest').value = item.interest || 0;
            document.getElementById('modal_tax').value = item.tax_expense || 0;
            document.getElementById('modal_total').value = item.total_amount || 0;
            
            form.elements['description'].value = item.description || '';
        }
        
        function calculateAmounts() {
            const amt = parseFloat(document.getElementById('modal_amount').value) || 0;
            const interest = parseFloat(document.getElementById('modal_interest').value) || 0;
            const tax = parseFloat(document.getElementById('modal_tax').value) || 0;
            document.getElementById('modal_total').value = (amt + interest - tax).toFixed(2);
        }

        async function saveTradeHistory(event) {
            if (event) event.preventDefault(); 
            if(!_supabase) return;

            const form = document.getElementById('register-form');
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            if(!data.maturity_date) data.maturity_date = null;
			
			const tradeId = document.getElementById('modal_trade_id').value;
			delete data.id;
			
            try {
                if (tradeId) {
                    const { error } = await _supabase
                        .from('deposit_management')
                        .update(data)
                        .eq('id', tradeId);
                        
                    if (error) throw error;
                    alert('수정되었습니다.');
                } else {
                    const { error } = await _supabase
                        .from('deposit_management')
                        .insert([data]);
                        
                    if (error) throw error;
                    alert('저장되었습니다.');
                }
                
                closeModal();
                
                if (document.getElementById('main-trade').style.display !== 'none') {
                    fetchTradeHistory(currentPage);
                } else {
                    fetchStatusHistory(currentStatusPage);
                }
                
            } catch (err) {
                alert('처리 중 에러가 발생했습니다: ' + err.message);
            }
        }

        function closeModal() { 
			document.getElementById('register-modal').style.display = 'none'; 
            document.querySelector('#draggable-modal h2').innerText = '예적금 내역 등록';
            document.getElementById('btn-submit-modal').innerText = '저장';
            document.getElementById('modal_trade_id').value = '';
            document.getElementById('register-form').reset();
		}
		
        function makeModalDraggable(modalEl, headerEl) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (headerEl) {
                headerEl.onmousedown = dragMouseDown;
            } else {
                modalEl.onmousedown = dragMouseDown;
            }

            function dragMouseDown(e) {
                e = e || window.event;
                if (['INPUT', 'SELECT', 'BUTTON', 'TEXTAREA'].includes(e.target.tagName)) return;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                modalEl.style.transform = 'none'; 
                modalEl.style.top = (modalEl.offsetTop - pos2) + "px";
                modalEl.style.left = (modalEl.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        window.onload = () => {
            setPlaceholderDate();
            switchView('status'); 
            
            const modal = document.getElementById('draggable-modal');
            const header = document.getElementById('modal-header-drag');
            if (modal && header) {
                makeModalDraggable(modal, header);
            }
        };
    </script>
</body>
</html>
